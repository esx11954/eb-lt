<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<script src="auth.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ステージ1 知識定着テスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --paper: oklch(0.975 0.006 95);
  --paper-2: oklch(0.945 0.008 95);
  --card: oklch(0.995 0.003 95);
  --ink: oklch(0.26 0.025 260);
  --ink-soft: oklch(0.50 0.02 260);
  --ink-faint: oklch(0.66 0.015 260);
  --line: oklch(0.90 0.008 260);
  --line-soft: oklch(0.94 0.006 260);
  --accent: oklch(0.58 0.085 195);
  --accent-deep: oklch(0.44 0.075 200);
  --accent-tint: oklch(0.95 0.028 195);
  --amber: oklch(0.70 0.13 65);
  --green: oklch(0.60 0.12 158);
  --green-tint: oklch(0.95 0.04 158);
  --red: oklch(0.57 0.16 25);
  --red-tint: oklch(0.95 0.035 25);
  --focus-ink: oklch(0.97 0.01 230);
  --focus-soft: oklch(0.74 0.02 235);
  --display:'Zen Kaku Gothic New', sans-serif;
  --sans:'Noto Sans JP', sans-serif;
  --mono:'JetBrains Mono', monospace;
  --mono2:'Roboto Mono', monospace;
}
*{margin:0; padding:0; box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--sans); color:var(--ink); background:var(--paper);
  line-height:1.8; font-size:16px; -webkit-font-smoothing:antialiased;
  transition:background .5s ease, color .5s ease;
}
body[data-mode='test']{
  background:radial-gradient(125% 90% at 50% -10%, oklch(0.30 0.035 250), oklch(0.18 0.025 258) 70%);
  color:var(--focus-ink);
}
.wrap{max-width:760px; margin:0 auto; padding:0 24px}
.screen{display:none}
.screen.on{display:block}

/* ---------- landing ---------- */
#landing{min-height:100vh; background:#f4f7f9}
#landing.on{display:block}
.cover{background:linear-gradient(155deg,#10212c 0%,#143a40 60%,#0f5560 100%); color:#fff; padding:60px 0 60px; position:relative; overflow:hidden}
.cover__grid{position:absolute; inset:0; background-image:linear-gradient(rgba(15,123,138,.10) 1px,transparent 1px),linear-gradient(90deg,rgba(15,123,138,.10) 1px,transparent 1px); background-size:36px 36px; opacity:.5}
.cover .wrap{position:relative}
.cover__eyebrow{font-family:var(--mono2); font-size:12px; font-weight:500; letter-spacing:.24em; color:#5fd0d8; text-transform:uppercase; margin-bottom:22px}
.cover__h{font-family:var(--display); font-weight:900; font-size:clamp(28px,5vw,44px); line-height:1.3; letter-spacing:.01em; margin-bottom:18px; color:#fff}
.cover__h em{font-style:normal; color:#6fd6dd}
.cover__lead{font-size:15.5px; color:#bfd6da; max-width:560px; line-height:1.95}
.cover__meta{margin-top:32px; display:flex; gap:12px; flex-wrap:wrap; font-family:var(--mono2); font-size:12px; color:#9fc4c9}
.cover__meta span{border:1px solid rgba(255,255,255,.22); padding:6px 13px; border-radius:30px}
.setup-zone{padding:0 0 64px}
.setup-zone .card{margin-top:-40px; position:relative}
#landing .btn-primary{background:#0f7b8a; box-shadow:0 6px 18px rgba(15,123,138,.32)}
#landing .btn-primary:hover{background:#0a525d}
.eyebrow{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.22em; color:var(--accent-deep); text-transform:uppercase}
.hero-h{font-family:var(--display); font-weight:900; font-size:clamp(30px,5.5vw,46px); line-height:1.18; margin:14px 0 12px; letter-spacing:-.01em}
.hero-h em{font-style:normal; color:var(--accent-deep)}
.hero-sub{color:var(--ink-soft); font-size:15px; max-width:30em}
.card{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:28px; margin-top:30px; box-shadow:0 1px 2px oklch(0.2 0.02 260 / .04), 0 22px 50px oklch(0.2 0.02 260 / .06)}
.field-label{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--accent-deep); display:block; margin-bottom:9px}
.field-label .req{color:var(--red); margin-left:5px}
.in{width:100%; font-family:var(--sans); font-size:16px; padding:13px 15px; border:1px solid var(--line); border-radius:12px; background:var(--paper); color:var(--ink); transition:border-color .15s, background .15s, box-shadow .15s}
.in:focus{outline:none; border-color:var(--accent); background:var(--card); box-shadow:0 0 0 4px var(--accent-tint)}
.in.need{border-color:var(--red); background:var(--red-tint)} .in.select{cursor:pointer; appearance:none; -webkit-appearance:none; background-image:linear-gradient(45deg,transparent 50%,var(--ink-faint) 50%),linear-gradient(135deg,var(--ink-faint) 50%,transparent 50%); background-position:calc(100% - 19px) 21px,calc(100% - 13px) 21px; background-size:6px 6px,6px 6px; background-repeat:no-repeat; padding-right:40px}
.meta-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:22px}
.meta{display:flex; flex-direction:column; gap:2px; padding:11px 16px; border:1px solid var(--line); border-radius:13px; background:var(--paper); flex:1; min-width:130px}
.meta b{font-family:var(--mono); font-size:19px; font-weight:800; color:var(--ink)}
.meta span{font-size:11.5px; color:var(--ink-faint)}
.best{margin-top:20px}
.best-ttl{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em; color:var(--accent-deep); margin-bottom:9px}
.pb-row{display:flex; flex-wrap:wrap; gap:8px}
.pb{display:flex; align-items:center; gap:7px; border:1px solid var(--line); border-radius:30px; padding:5px 13px; font-size:12px; background:var(--paper)}
.pb--has{border-color:#b9dfe2; background:var(--accent-tint)}
.pb__p{font-family:var(--mono); color:var(--ink-soft)}
.pb--has .pb__p{color:var(--accent-deep)}
.pb__v{font-family:var(--mono); font-weight:800; color:var(--ink-faint)}
.pb--has .pb__v{color:var(--accent-deep)}
.btn{font-family:var(--sans); font-weight:700; font-size:16px; border:none; border-radius:13px; padding:14px 26px; cursor:pointer; transition:transform .08s ease, background .15s, box-shadow .2s, opacity .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--accent); color:oklch(0.99 0.01 195); box-shadow:0 6px 18px oklch(0.58 0.085 195 / .32)}
.btn-primary:hover{background:var(--accent-deep)}
.btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--line)}
.btn-ghost:hover{background:var(--paper-2); color:var(--ink)}
.btn-danger{background:transparent; color:var(--red); border:1px solid oklch(0.80 0.07 25)}
.btn-danger:hover{background:var(--red-tint)}
.btn:disabled{opacity:.38; cursor:not-allowed; box-shadow:none}
.start-btn{width:100%; margin-top:26px; padding:17px; font-size:17px}

/* ---------- countdown ---------- */
#cd{position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center; background:radial-gradient(circle at 50% 40%, oklch(0.26 0.03 250), oklch(0.15 0.02 258))}
#cd.on{display:flex}
.cd-ring{position:relative; width:190px; height:190px}
.cd-ring svg{width:190px; height:190px; transform:rotate(-90deg)}
.cd-ring .trk{fill:none; stroke:oklch(1 0 0 / .12); stroke-width:6}
.cd-ring .bar{fill:none; stroke:var(--accent); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset .1s linear}
.cd-num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:800; font-size:88px; color:var(--focus-ink)}
.cd-cap{position:absolute; left:0; right:0; bottom:-46px; text-align:center; font-family:var(--mono); font-size:11px; letter-spacing:.22em; color:var(--focus-soft); text-transform:uppercase}
@keyframes pop{0%{transform:scale(.6); opacity:0} 40%{opacity:1} 100%{transform:scale(1); opacity:1}}
.cd-num.tick{animation:pop .5s cubic-bezier(.2,.8,.2,1)}

/* ---------- runner (dark focus) ---------- */
#runner{min-height:100vh; display:none; flex-direction:column; padding:24px 0 30px}
#runner.on{display:flex}
.topbar{display:flex; align-items:center; gap:16px}
.timer{position:relative; width:62px; height:62px; flex:0 0 auto}
.timer svg{width:62px; height:62px; transform:rotate(-90deg)}
.timer .trk{fill:none; stroke:oklch(1 0 0 / .12); stroke-width:5}
.timer .bar{fill:none; stroke:var(--accent); stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset .12s linear, stroke .3s}
.timer .bar.warn{stroke:var(--amber)} .timer .bar.crit{stroke:var(--red)}
.timer .num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:800; font-size:19px; color:var(--focus-ink)}
.timer .num.warn{color:var(--amber)} .timer .num.crit{color:var(--red)}
.prog{flex:1}
.prog-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px}
.prog-q{font-family:var(--mono); font-weight:800; font-size:15px; color:var(--focus-ink); letter-spacing:.02em}
.prog-q .tot{color:var(--focus-soft); font-weight:500}
.prog-part{font-size:11.5px; color:var(--focus-soft)}
.prog-track{height:5px; background:oklch(1 0 0 / .12); border-radius:6px; overflow:hidden}
.prog-fill{height:100%; width:0; background:var(--accent); border-radius:6px; transition:width .4s cubic-bezier(.2,.8,.2,1)}
.qzone{flex:1; display:flex; flex-direction:column; justify-content:center; padding:18px 0}
.qcard{background:var(--card); border-radius:22px; padding:30px 28px; box-shadow:0 30px 70px oklch(0.1 0.02 258 / .45)}
.qcard .qtext{font-family:var(--display); font-weight:700; font-size:21px; line-height:1.6; color:var(--ink); text-wrap:pretty; margin-bottom:22px}
.opts{display:flex; flex-direction:column; gap:11px}
.opt{display:flex; align-items:center; gap:14px; padding:15px 17px; border:1.5px solid var(--line); border-radius:14px; background:var(--paper); cursor:pointer; font-size:15.5px; color:var(--ink); text-align:left; line-height:1.55; transition:border-color .14s, background .14s, transform .08s}
.opt:hover{border-color:var(--accent); background:var(--accent-tint)}
.opt:active{transform:scale(.995)}
.opt .mk{flex:0 0 auto; width:24px; height:24px; border-radius:50%; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; transition:border-color .14s, background .14s}
.opt .mk::after{content:''; width:9px; height:9px; border-radius:50%; background:var(--card); transform:scale(0); transition:transform .16s cubic-bezier(.2,.9,.3,1.4)}
.opt.sel{border-color:var(--accent); background:var(--accent-tint)}
.opt.sel .mk{border-color:var(--accent); background:var(--accent)}
.opt.sel .mk::after{transform:scale(1)}
.foot{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:4px}
@media (prefers-reduced-motion: no-preference){
  .qcard{animation:qin .42s cubic-bezier(.2,.8,.2,1)}
  @keyframes qin{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)}}
}

/* ---------- result ---------- */
#result{min-height:100vh; display:none; flex-direction:column; justify-content:center; padding:40px 0}
#result.on{display:flex}
#result.reviewing{justify-content:flex-start}
.res-card{background:var(--card); border:1px solid var(--line); border-radius:22px; padding:34px 30px; box-shadow:0 1px 2px oklch(0.2 0.02 260 / .04), 0 22px 50px oklch(0.2 0.02 260 / .07); text-align:center}
.res-eyebrow{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.2em; color:var(--ink-faint); text-transform:uppercase}
.res-score{font-family:var(--mono); font-weight:800; font-size:74px; line-height:1; margin:12px 0 4px; color:var(--ink); letter-spacing:-.02em}
.res-score .pc{font-size:30px; color:var(--ink-faint); margin-left:4px}
.res-frac{font-family:var(--mono); font-size:14px; color:var(--ink-faint)}
.badge{display:inline-block; font-family:var(--mono); font-weight:800; font-size:14px; letter-spacing:.04em; padding:7px 22px; border-radius:30px; margin-top:18px}
.badge.pass{background:var(--green-tint); color:var(--green)}
.badge.fail{background:var(--red-tint); color:var(--red)}
.res-actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:26px}
.res-back{margin-top:18px; border-top:1px solid var(--line-soft); padding-top:16px}
.res-back .btn{font-size:14px; padding:11px 20px}

/* ---------- review ---------- */
.review{margin-top:26px; display:flex; flex-direction:column; gap:14px; padding-bottom:30px}
.review-h{font-family:var(--display); font-weight:900; font-size:19px; margin-bottom:2px; color:var(--ink)}
.rv{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px}
.rv-top{display:flex; align-items:center; gap:10px; margin-bottom:12px}
.rv-no{font-family:var(--mono); font-weight:800; font-size:12px; color:var(--card); background:var(--ink); border-radius:7px; padding:3px 9px}
.rv-verdict{font-family:var(--mono); font-weight:800; font-size:12px}
.rv-verdict.ok{color:var(--green)} .rv-verdict.ng{color:var(--red)} .rv-verdict.no{color:var(--ink-faint)}
.rv-q{font-weight:700; font-size:15.5px; color:var(--ink); margin-bottom:12px; line-height:1.6; text-wrap:pretty}
.rv-opt{display:flex; gap:10px; padding:10px 13px; border:1px solid var(--line); border-radius:11px; margin:7px 0; font-size:14px; line-height:1.55; color:var(--ink-soft)}
.rv-opt .tag{margin-left:auto; font-family:var(--mono); font-size:10.5px; font-weight:800; white-space:nowrap; align-self:center}
.rv-opt.correct{background:var(--green-tint); border-color:var(--green); color:var(--ink)}
.rv-opt.correct .tag{color:var(--green)}
.rv-opt.wrong{background:var(--red-tint); border-color:var(--red); color:var(--ink)}
.rv-opt.wrong .tag{color:var(--red)}
.rv-ex{margin-top:12px; font-size:13.5px; color:var(--ink-soft); line-height:1.7}
.rv-why{margin-top:10px; background:var(--accent-tint); border-radius:11px; padding:11px 14px; font-size:13px; color:var(--accent-deep); line-height:1.65}
.rv-ch{display:inline-block; margin-top:11px; font-family:var(--mono); font-size:11px; color:var(--ink-faint); background:var(--line-soft); border-radius:7px; padding:3px 9px}

/* ---------- modal ---------- */
.modal{position:fixed; inset:0; z-index:90; display:none; align-items:center; justify-content:center; padding:24px; background:oklch(0.16 0.02 258 / .55); backdrop-filter:blur(3px)}
.modal.on{display:flex}
.modal-card{background:var(--card); border-radius:20px; padding:28px 26px; max-width:380px; width:100%; text-align:center; box-shadow:0 30px 70px oklch(0.1 0.02 258 / .4)}
.modal-msg{font-family:var(--display); font-weight:700; font-size:18px; color:var(--ink); line-height:1.6}
.modal-sub{display:block; font-family:var(--sans); font-weight:400; font-size:13px; color:var(--ink-soft); margin-top:8px}
.modal-btns{display:flex; gap:12px; justify-content:center; margin-top:22px}
</style>
</head>
<body data-mode="landing">

<!-- ===== LANDING ===== -->
<main id="landing" class="screen on">
  <header class="cover">
    <div class="cover__grid"></div>
    <div class="wrap">
      <div class="cover__eyebrow">EIGHT BIT inc. — Stage 1 / Knowledge Check</div>
      <h1 class="cover__h">ステージ1：<em>知識定着テスト</em></h1>
      <p class="cover__lead">『エンジニア知識ハンドブック』の知識が、面接で使えるレベルで頭に入っているかを確認します。スキルシートを読み解くための定着度をチェック。</p>
      <div class="cover__meta"><span>RANDOM 25Q</span><span>各問 20秒</span><span>合格 80%</span></div>
    </div>
  </header>
  <div class="setup-zone">
    <div class="wrap">
    <div class="card">
      <label class="field-label" for="who">受験者名<span class="req">必須</span></label>
      <input class="in" id="who" type="text" placeholder="山田 太郎" autocomplete="off" />

      <label class="field-label" for="partsel" style="margin-top:18px">受験する範囲</label>
      <select class="in select" id="partsel">
        <option value="Part 1 — 業界と全体像">Part 1 — 業界と全体像</option>
        <option value="Part 2 — 情シス（社内SE）">Part 2 — 情シス（社内SE）</option>
        <option value="Part 3 — 開発エンジニア">Part 3 — 開発エンジニア</option>
        <option value="Part 4 — インフラエンジニア">Part 4 — インフラエンジニア</option>
        <option value="Part 5 — 面接の実践">Part 5 — 面接の実践</option>
        <option value="">全Part ミックス（各分野からランダム）</option>
      </select>

      <div class="meta-row">
        <div class="meta"><b>25</b><span>問・ランダム出題</span></div>
        <div class="meta"><b>20<small style="font-size:12px">秒</small></b><span>1問あたりの制限時間</span></div>
        <div class="meta"><b>80%</b><span>合格ライン（20問正解）</span></div>
      </div>

      <div class="best" id="best"></div>

      <button class="btn btn-primary start-btn" id="startBtn">テストを開始する</button>
    </div>
    </div>
  </div>
</main>

<!-- ===== RUNNER ===== -->
<div id="runner" class="screen">
  <div class="wrap" style="display:flex; flex-direction:column; flex:1">
    <div class="topbar">
      <div class="timer" id="timer">
        <svg viewBox="0 0 62 62"><circle class="trk" cx="31" cy="31" r="27"></circle><circle class="bar" id="tBar" cx="31" cy="31" r="27"></circle></svg>
        <div class="num" id="tNum">20</div>
      </div>
      <div class="prog">
        <div class="prog-top">
          <div class="prog-q">Q<span id="pNow">1</span><span class="tot"> / <span id="pTot">25</span></span></div>
          <div class="prog-part" id="pPart"></div>
        </div>
        <div class="prog-track"><div class="prog-fill" id="pFill"></div></div>
      </div>
    </div>

    <div class="qzone">
      <div id="qhost"></div>
    </div>

    <div class="foot">
      <button class="btn btn-danger" id="endBtn">テストを終了する</button>
      <button class="btn btn-primary" id="nextBtn" disabled>次へ</button>
    </div>
  </div>
</div>

<!-- ===== COUNTDOWN ===== -->
<div id="cd">
  <div class="cd-ring">
    <svg viewBox="0 0 190 190"><circle class="trk" cx="95" cy="95" r="88"></circle><circle class="bar" id="cdBar" cx="95" cy="95" r="88"></circle></svg>
    <div class="cd-num" id="cdNum">3</div>
    <div class="cd-cap">まもなく開始</div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<main id="result" class="screen">
  <div class="wrap" id="resultWrap"></div>
</main>

<!-- ===== END MODAL ===== -->
<div class="modal" id="endModal">
  <div class="modal-card">
    <p class="modal-msg">テストを終了しますか？<span class="modal-sub">ここまでの回答で採点されます。</span></p>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="endCancel">キャンセル</button>
      <button class="btn btn-danger" id="endOk">終了する</button>
    </div>
  </div>
</div>

<script>
window.BANK=[{"id":"P1-001","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"IT業界で「事業会社（ユーザー企業）」が指すものとして正しいのはどれか。","opts":["ITが本業ではなく、システムを実際に使い、お金を出して発注する側の会社","エンドユーザーから依頼を受け、要件定義から運用までまるごと請け負う元請け会社","エンジニアの働く時間を提供し、客先に常駐させることを主な事業とするSES会社","元請けから仕事の一部を再発注で受け取り、実装やテストを担う二次請けの会社","他社のエンジニアを束ねてプロジェクト全体を取り仕切る一次請けの会社"],"ans":"ITが本業ではなく、システムを実際に使い、お金を出して発注する側の会社","ex":"事業会社はメーカーや小売・金融などITが本業でない会社で、発注のおおもとになるためエンドユーザーとも呼ばれる。","why":"スキルシートの立場（商流）を読むとき、誰が発注側かを区別する土台になる。"},{"id":"P1-002","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"SIer（元請け）の説明として正しいのはどれか。","opts":["エンドユーザーから依頼を受け、要件定義から開発・運用までまるごと請け負う会社","ITが本業ではなく、システムを使って自社の業務を行う発注側のユーザー企業","エンジニアの技術力（働く時間）を提供し、客先常駐を主な事業とするSES会社","事業会社の中で社内ITやヘルプデスクを担当する情シス部署","三次請けとして実装やテストだけを再発注で担当する下流の会社"],"ans":"エンドユーザーから依頼を受け、要件定義から開発・運用までまるごと請け負う会社","ex":"SIerはSystem Integrationの略で、発注を直接受ける“作る側のとりまとめ役”であり元請けと呼ばれる。","why":"応募者がいた会社の立場（元請けか下請けか）を読み解く前提になる。"},{"id":"P1-003","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"SES（System Engineering Service）の一般的なスタイルとして正しいのはどれか。","opts":["エンジニアが客先に出向いて常駐し、技術力（働く時間）を提供する","完成した成果物を約束して納め、その完成責任（作り上げる責任）を負う","システムを発注する側に立ち、外部ベンダーを選定して管理する","社内の課題を整理し、システムを企画して導入する役割を担う","プロジェクト全体の予算と人員を取りまとめ、進行を管理する"],"ans":"エンジニアが客先に出向いて常駐し、技術力（働く時間）を提供する","ex":"SESは技術力（働く時間）を提供する契約形態で、エンジニアが客先に常駐して働くスタイルが一般的。","why":"応募者の客先常駐経験を読み解く前提になる。"},{"id":"P1-004","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"IT業界でお金と仕事が流れる順番（商流）として正しいのはどれか。","opts":["エンドユーザー（事業会社） → 元請け（SIer） → SES","SES → 元請け（SIer） → エンドユーザー（事業会社）","元請け（SIer） → エンドユーザー（事業会社） → SES","エンドユーザー（事業会社） → SES → 元請け（SIer）","SES → エンドユーザー（事業会社） → 元請け（SIer）"],"ans":"エンドユーザー（事業会社） → 元請け（SIer） → SES","ex":"発注のおおもとである事業会社から元請け、さらにSESへと流れる。この流れを商流と呼ぶ。","why":"応募者がいた商流上の位置を読む土台になる。"},{"id":"P1-005","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"「多重請負（多重下請け）」の説明として正しいのはどれか。","opts":["受けた会社が仕事の一部をさらに別の会社へ再発注することが繰り返され、何段階にもなる構造","1社が要件定義から運用まですべての工程を、外部に出さず最初から最後まで自社だけで担当する構造","複数の事業会社が共同で出資し、1つのシステムを一緒に発注して費用を分担する構造","1人のエンジニアが複数の客先を同時に掛け持ちし、日替わりで別々の現場へ通う働き方","元請けが下請けを一切使わず、人員も予算もすべて自社内でまかなって完結させる構造"],"ans":"受けた会社が仕事の一部をさらに別の会社へ再発注することが繰り返され、何段階にもなる構造","ex":"大規模開発は人手が足りず、受けた仕事の一部を別会社へ再発注することが何段階も重なる。","why":"応募者が一次請け・二次請け・三次請けのどこにいたかを読む前提になる。"},{"id":"P1-006","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"商流における「下流（二次請け・三次請け）」の一般的な傾向として正しいのはどれか。","opts":["受け取る単価が下がり、担当が実装やテストなど作業寄りの工程に偏りやすい","受け取る単価が上がり、担当が要件定義や基本設計など上流工程に偏りやすい","発注者と直接やり取りし、プロジェクト全体の取りまとめを担うことが多い","契約形態が必ず労働者派遣になり、客先が直接指示を出す形に固定される","運用保守だけは下流が担当できず、必ず元請けが自社で抱える決まりになる"],"ans":"受け取る単価が下がり、担当が実装やテストなど作業寄りの工程に偏りやすい","ex":"下の立場ほど単価は下がり、担当が実装・テストといった作業寄りの工程に偏りやすい。","why":"応募者が積んできた経験の種類を商流位置から推測する手がかりになる。"},{"id":"P1-007","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"「労働者派遣」の契約形態の説明として正しいのはどれか。","opts":["派遣先（客先）が直接指示でき、責任の対象は労働時間の提供である","所属元が指示し、責任の対象は完成した成果物を納める完成責任である","所属元が指示し、責任の対象は業務の遂行であり完成責任までは負わない","客先が直接指示するが、責任の対象は完成した成果物を納める完成責任である","誰も直接指示できず、責任の対象は労働時間の提供だけにとどまる"],"ans":"派遣先（客先）が直接指示でき、責任の対象は労働時間の提供である","ex":"労働者派遣は派遣先（客先）が直接指示でき、提供するのは労働時間である。","why":"応募者の契約形態を読み、誰が指示していたかを確かめる前提になる。"},{"id":"P1-008","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"「請負」の契約形態の説明として正しいのはどれか。","opts":["所属元が指示し、成果物の完成責任を負う。客先は直接指示できない","客先が直接指示でき、責任の対象は労働時間の提供にとどまる","所属元が指示するが、完成責任は負わず業務の遂行が責任の対象である","客先が直接指示し、責任の対象は業務の遂行であり完成責任は負わない","所属元が指示するが、責任の対象は労働時間の提供だけにとどまる"],"ans":"所属元が指示し、成果物の完成責任を負う。客先は直接指示できない","ex":"請負は完成品を約束して納める契約で、作り上げる責任（完成責任）まで負う。客先は直接指示できない。","why":"応募者の契約形態と責任範囲を区別する前提になる。"},{"id":"P1-009","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"SESの多くが当てはまる「準委任」の契約形態の説明として正しいのはどれか。","opts":["所属元が指示し、業務の遂行（労働力提供）が責任で、完成責任は負わない","所属元が指示し、完成した成果物を納める完成責任までしっかり負う","派遣先（客先）が直接指示でき、責任の対象は労働時間の提供である","客先が直接指示し、完成した成果物を納める完成責任までを負う","所属元が指示し、成果物の品質保証や不具合の修補責任まで負う"],"ans":"所属元が指示し、業務の遂行（労働力提供）が責任で、完成責任は負わない","ex":"準委任は決められた業務をきちんと行う（労働力を提供する）契約で、完成させる責任までは負わない。","why":"SES案件の契約実態を読み解く前提になる。"},{"id":"P1-010","part":"Part 1 — 業界と全体像","ch":"第1章","type":"choice","q":"準委任契約で客先に常駐する場合、指揮命令について正しいのはどれか。","opts":["客先はエンジニアに直接命令できず、指揮命令は所属元が行うのが建前である","客先がエンジニアに直接命令を出せ、所属元は指揮命令にいっさい関与しないのが建前である","所属元も客先もどちらも命令できず、エンジニアが自分の判断だけで業務を進めるのが建前である","客先と所属元が日や工程ごとに交代で命令を出す取り決めになるのが建前である","常駐している以上、契約名にかかわらず自動的に労働者派遣契約へ切り替わるのが建前である"],"ans":"客先はエンジニアに直接命令できず、指揮命令は所属元が行うのが建前である","ex":"準委任では客先は直接命令できず、指揮命令は所属元が行う。客先が直接細かく指示すると偽装請負の問題につながる。","why":"「常駐＝派遣ではない」という区別を踏まえて応募者の働き方を読む前提になる。"},{"id":"P1-011","part":"Part 1 — 業界と全体像","ch":"第2章","type":"choice","q":"開発系エンジニアのうち「フロントエンド」が主に担当する範囲として正しいのはどれか。","opts":["利用者が見て操作する画面側（ボタンの配置・見た目・操作性）を作る","裏で動く処理やデータ（金額計算・データの保存と取り出し）を作る","サーバーやネットワークなどシステムが動く土台を設計・構築する","稼働中システムの監視とトラブル対応・定期的な手入れを続ける","社内の課題整理と外部ベンダーへの発注・管理を担当する"],"ans":"利用者が見て操作する画面側（ボタンの配置・見た目・操作性）を作る","ex":"フロントエンドは利用者が見て操作する画面側を担当し、ボタンの配置や見た目、操作のしやすさを扱う。","why":"使用技術欄からその人が画面側か裏側かを読む前提になる。"},{"id":"P1-012","part":"Part 1 — 業界と全体像","ch":"第2章","type":"choice","q":"開発系エンジニアのうち「バックエンド」が主に担当する範囲として正しいのはどれか。","opts":["裏で動く処理やデータ（注文金額の計算・データの保存と取り出し）を作る","利用者が見て操作する画面側の見た目と操作性（ボタンや配置）を作る","サーバーやネットワークなどシステムが動く土台を設計・構築する","プロジェクト全体の進行・人員・予算を取りまとめて管理する","社内ヘルプデスクや社内インフラの運用を日々担当する"],"ans":"裏で動く処理やデータ（注文金額の計算・データの保存と取り出し）を作る","ex":"バックエンドは画面の裏で動く処理やデータを担当し、金額計算やデータの保存・取り出しを扱う。","why":"使用技術欄からその人が裏側の処理担当かを読む前提になる。"},{"id":"P1-013","part":"Part 1 — 業界と全体像","ch":"第2章","type":"choice","q":"「インフラ系」エンジニアの役割として正しいのはどれか。","opts":["サーバー・ネットワーク・クラウドなどアプリが動く土台（環境）を設計・構築する","利用者が操作するアプリの画面そのものや、その裏で動く処理を書いて作り上げる","プロジェクト全体の予算と人員を取りまとめ、計画どおりに進むよう管理する","社内の課題を整理してシステムを企画し、外部ベンダーに発注して管理する","稼働後のシステムを毎日見守り、トラブル対応や問い合わせ対応を続ける"],"ans":"サーバー・ネットワーク・クラウドなどアプリが動く土台（環境）を設計・構築する","ex":"インフラ系はアプリそのものではなく、アプリが安定して動くための環境（土台）を用意する。","why":"使用技術欄から開発系かインフラ系かを見極める前提になる。"},{"id":"P1-014","part":"Part 1 — 業界と全体像","ch":"第2章","type":"choice","q":"「運用・保守系」エンジニアの説明として正しいのはどれか。","opts":["稼働中のシステムを毎日見守り、トラブル対応や定期的な手入れをする","プログラムを書いて、アプリやシステムそのものを新規に作り上げる","サーバーやネットワークなど、アプリが動く土台を設計・構築する","プロジェクト全体の進行・人員・予算・品質を取りまとめて管理する","社内の課題を整理し、外部ベンダーへの発注と管理を行う"],"ans":"稼働中のシステムを毎日見守り、トラブル対応や定期的な手入れをする","ex":"運用・保守系は稼働後の長い期間を支える役割で、未経験からITに入る入口になることが多い。","why":"担当工程の運用保守欄を読み、その人の段階を把握する前提になる。"},{"id":"P1-015","part":"Part 1 — 業界と全体像","ch":"第2章","type":"choice","q":"PM（プロジェクトマネージャー）やPLが属する「管理・上流系」の説明として正しいのはどれか。","opts":["プロジェクト全体の進行・人員・予算・品質を取りまとめ、チームをまとめて計画どおりに進める","自分でプログラムのコードを書いて、利用者が使うアプリやシステムそのものを作り上げる","サーバーやネットワークなど、アプリが動く土台を設計して構築する","稼働中のシステムを見守り、トラブルがあれば対応して稼働を維持する","社内のヘルプデスク業務や社内インフラの運用を日々担当する"],"ans":"プロジェクト全体の進行・人員・予算・品質を取りまとめ、チームをまとめて計画どおりに進める","ex":"管理・上流系は自分で手を動かすより、チームをまとめ計画どおりに進めるのが仕事。現場経験者がステップアップして就くことが多い。","why":"役割欄のリーダー・PMを読む前提になる。"},{"id":"P1-016","part":"Part 1 — 業界と全体像","ch":"第2章","type":"choice","q":"事業会社の中でITを担う「情シス（社内SE）」の立場として正しいのはどれか。","opts":["システムを使う側・発注する側にあたり、業務理解・要件整理・調整の力が軸になる","システムを作る側・動かす側にあたり、深い専門技術や実装力が必須になる","客先に常駐して技術力（働く時間）を提供するSESの立場にあたる","元請けとして他社の開発を取りまとめ、全体を統括する立場にあたる","三次請けとして実装やテストだけを再発注で担当する立場にあたる"],"ans":"システムを使う側・発注する側にあたり、業務理解・要件整理・調整の力が軸になる","ex":"情シスは作る・動かす側ではなく使う側・発注する側にあたり、深い専門技術より業務理解・要件整理・調整が軸になる。","why":"応募者が作る側か発注側かを見極める前提になる。"},{"id":"P1-017","part":"Part 1 — 業界と全体像","ch":"第2章","type":"choice","q":"SESの求人で多い職種と、そこからのキャリアの流れとして正しいのはどれか。","opts":["まず運用監視から始め、経験を積んで構築、さらに設計へと上流の工程へステップアップする","まず設計から始め、構築を経て運用監視へと、だんだん下流の工程へ下りていくのが定番である","まず要件定義から始め、経験を積んでから実装へ下りていくのが定番の流れである","最初からPM・PLとして現場に入り、後から実装やインフラ構築を覚えていくのが定番である","運用監視と設計はまったく無関係の領域で、片方からもう片方へは行き来できない"],"ans":"まず運用監視から始め、経験を積んで構築、さらに設計へと上流の工程へステップアップする","ex":"運用監視は未経験でも始めやすく、そこから構築、設計へと上流へステップアップしていくのが定番の流れ。","why":"応募者が「見守る・作る・設計する」のどの段階にいるかを読む前提になる。"},{"id":"P1-018","part":"Part 1 — 業界と全体像","ch":"第3章","type":"choice","q":"ウォーターフォール開発の進め方の説明として正しいのはどれか。","opts":["決められた工程を1つずつ順番に完了させてから次へ進み、後戻りしない前提で計画する","最初は全体を決めず、小さく作って早く形にし、確かめながら改善を短い周期で繰り返す","すべての工程を最初から同時並行で進め、最後にまとめて1度だけ結合して仕上げる","工程の順番をあらかじめ決めず、その都度必要になったものから着手していく","実装だけを先にすべて終わらせてから、後で設計をまとめてやり直していく"],"ans":"決められた工程を1つずつ順番に完了させてから次へ進み、後戻りしない前提で計画する","ex":"ウォーターフォールは水が滝を一方向に流れるように、各工程を順番に完了させてから次へ進む。","why":"応募者が経験した現場の進め方を読む前提になる。"},{"id":"P1-019","part":"Part 1 — 業界と全体像","ch":"第3章","type":"choice","q":"ウォーターフォール開発の工程を上流から順に並べたとき、正しいのはどれか。","opts":["要件定義 → 基本設計 → 詳細設計 → 実装 → テスト","基本設計 → 要件定義 → 実装 → テスト → 詳細設計","実装 → 詳細設計 → 基本設計 → テスト → 要件定義","要件定義 → 実装 → 基本設計 → テスト → 詳細設計","テスト → 実装 → 詳細設計 → 基本設計 → 要件定義"],"ans":"要件定義 → 基本設計 → 詳細設計 → 実装 → テスト","ex":"上流から要件定義→基本設計（外部設計）→詳細設計（内部設計）→実装→テストと進む。","why":"スキルシートの担当工程欄で、その人が上流か下流かを読む土台になる。"},{"id":"P1-020","part":"Part 1 — 業界と全体像","ch":"第3章","type":"choice","q":"「基本設計（外部設計）」の工程でやることとして正しいのはどれか。","opts":["画面・帳票・機能など利用者から“見える部分”の仕様を設計する","プログラム内部の処理の作り方やロジックの詳細を設計する","発注者と「何を作るか」を整理し、要件として文書化する","設計書をもとに実際にプログラムのコードを書き上げる","作った部品ごとに設計どおり正しく動くかを確認する"],"ans":"画面・帳票・機能など利用者から“見える部分”の仕様を設計する","ex":"基本設計（外部設計）は画面・帳票・機能など見える部分を設計する工程。","why":"担当工程欄の基本設計を読み、その人が外部設計を担えたかを確かめる前提になる。"},{"id":"P1-021","part":"Part 1 — 業界と全体像","ch":"第3章","type":"choice","q":"「詳細設計（内部設計）」の工程でやることとして正しいのはどれか。","opts":["プログラム内部の処理の作り方やロジックの詳細を設計する","画面や帳票など利用者から見える部分の仕様を設計する","発注者と「何を作るか」を整理し、要件として文書化する","本番公開し、稼働後のトラブル対応や手入れを続ける","業務シナリオを通して全体が一通り動くかを確認する"],"ans":"プログラム内部の処理の作り方やロジックの詳細を設計する","ex":"詳細設計（内部設計）はプログラム内部の作り方を設計する工程で、基本設計の後・実装の前にあたる。","why":"担当工程欄の詳細設計を読み、外部設計と取り違えないための前提になる。"},{"id":"P1-022","part":"Part 1 — 業界と全体像","ch":"第3章","type":"choice","q":"「要件定義」の工程でやることとして正しいのはどれか。","opts":["「何を作るか」を発注者と整理し、要件として文書化する","プログラム内部の処理の作り方やロジックを設計する","作った部品を組み合わせて全体が動くかを確認する","設計書をもとに実際にプログラムのコードを書く","本番公開後の改修や利用者からの問い合わせに対応する"],"ans":"「何を作るか」を発注者と整理し、要件として文書化する","ex":"要件定義は発注者と「何を作るか」を整理し文書化する最上流の工程で、主に上流SEやPMが担当する。","why":"担当工程欄で最上流の経験があるかを読む前提になる。"},{"id":"P1-023","part":"Part 1 — 業界と全体像","ch":"第3章","type":"choice","q":"V字モデルが示している対応関係として正しいのはどれか。","opts":["左側の各「設計」工程と、右側の各「テスト」工程が左右で対応している","上流工程ほど単価が高く、下流工程ほど単価が低いことを示している","要件定義と実装がまったく同じ作業であることを示している","アジャイルとウォーターフォールの進め方の違いを示している","契約形態（請負・準委任）と責任範囲の対応を示している"],"ans":"左側の各「設計」工程と、右側の各「テスト」工程が左右で対応している","ex":"V字モデルは実装を底にV字に折り曲げ、左の設計工程と右のテスト工程が対応することを示す。","why":"応募者がどのテストで何を確認していたかを読む前提になる。"},{"id":"P1-024","part":"Part 1 — 業界と全体像","ch":"第3章","type":"choice","q":"V字モデルにおいて「要件定義」と対応する（その通りにできているかを確認する）テストはどれか。","opts":["総合テスト","単体テスト","結合テスト","基本設計","詳細設計"],"ans":"総合テスト","ex":"V字モデルでは要件定義は総合テストと、基本設計は結合テストと、詳細設計は単体テストと対応する。","why":"応募者の担当テストが上流の何を検証していたかを読む前提になる。"},{"id":"P1-025","part":"Part 1 — 業界と全体像","ch":"第3章","type":"choice","q":"V字モデルにおいて「詳細設計」と対応するテストはどれか。","opts":["単体テスト","総合テスト","結合テスト","要件定義テスト","受け入れテスト"],"ans":"単体テスト","ex":"V字モデルでは詳細設計は単体テストと対応し、部品ごとに設計どおり動くかを確認する。","why":"応募者の単体テスト経験がどの設計に対応するかを読む前提になる。"},{"id":"P1-026","part":"Part 1 — 業界と全体像","ch":"第3章","type":"choice","q":"「基本設計（外部設計）」の主な成果物の組み合わせとして正しいのはどれか。","opts":["基本設計書・画面設計書・ER図","要件定義書・業務フロー図","ソースコード・単体テスト用のコード","単体テスト仕様書・テスト結果報告書","リリース手順書・運用保守記録"],"ans":"基本設計書・画面設計書・ER図","ex":"基本設計（外部設計）では画面・帳票設計やDBの全体設計を行い、基本設計書・画面設計書・ER図などを作る。","why":"担当工程の実態を成果物から答え合わせする前提になる。"},{"id":"P1-027","part":"Part 1 — 業界と全体像","ch":"第4章","type":"choice","q":"アジャイル開発の進め方の説明として正しいのはどれか。","opts":["最初にすべてを決めきらず、小さく作って早く形にし、確かめながら改善を繰り返す","最初に全体の仕様をすべて決めてから、工程を順番にたどって一気に作り上げる","設計の工程を省略し、いきなり完成版を一度だけまとめて作り上げる","工程を上流から下流へ一方向にだけ流し、後戻りしない前提で進める","テストを各工程では行わず、すべて最後にまとめて一度だけ実施する"],"ans":"最初にすべてを決めきらず、小さく作って早く形にし、確かめながら改善を繰り返す","ex":"アジャイルは最初に全部を決めず、小さく作って早く形にし、確かめながら改善を繰り返す進め方。","why":"応募者が経験した現場文化（反復型か）を読む前提になる。"},{"id":"P1-028","part":"Part 1 — 業界と全体像","ch":"第4章","type":"choice","q":"アジャイルの代表的なやり方「スクラム」で、開発をひと区切りとして繰り返す短い期間を何と呼ぶか。","opts":["スプリント","ウォーターフォール","プロダクトバックログ","マイルストーン","リグレッションテスト"],"ans":"スプリント","ex":"スクラムでは1〜4週間ほどの短い期間をスプリントと呼び、計画→開発→レビュー→振り返りを繰り返す。","why":"スクラム経験者の関わり方を具体的に読む前提になる。"},{"id":"P1-029","part":"Part 1 — 業界と全体像","ch":"第4章","type":"choice","q":"スクラムの代表的な3つの役割の組み合わせとして正しいのはどれか。","opts":["プロダクトオーナー・スクラムマスター・開発チーム","プロジェクトマネージャー・チームリーダー・テスター","要件定義の担当・基本設計の担当・実装の担当","フロントエンド担当・バックエンド担当・インフラ担当","元請け会社・二次請け会社・三次請け会社"],"ans":"プロダクトオーナー・スクラムマスター・開発チーム","ex":"スクラムには何を優先するか決めるプロダクトオーナー、進行役のスクラムマスター、手を動かす開発チームの3役割がある。","why":"スクラム経験者がどの役割だったかを読む前提になる。"},{"id":"P1-030","part":"Part 1 — 業界と全体像","ch":"第4章","type":"choice","q":"ウォーターフォールとアジャイルの「仕様変更への強さ」と「向く案件」の組み合わせとして正しいのはどれか。","opts":["ウォーターフォールは仕様変更に弱く大規模・基幹系向き、アジャイルは仕様変更に強くWeb・新規向き","ウォーターフォールは仕様変更に強くWeb・新規向き、アジャイルは仕様変更に弱く基幹系向き","どちらも仕様変更に強く、案件の性質による向き不向きはまったくないのが特徴である","ウォーターフォールもアジャイルも、官公庁の大規模な基幹系にのみ向くのが特徴である","アジャイルは仕様変更に弱くドキュメントが多い点が、ウォーターフォールとの違いである"],"ans":"ウォーターフォールは仕様変更に弱く大規模・基幹系向き、アジャイルは仕様変更に強くWeb・新規向き","ex":"ウォーターフォールは後戻りが高コストで大規模・基幹系・官公庁向き、アジャイルは変更に強くWeb・新規・スタートアップ向き。","why":"応募者の経験した案件性質と現場文化を読む前提になる。"},{"id":"P2-001","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「情シス（情報システム部門）」とは、どういう立場の部署か。","opts":["本業はITではない会社の中にあり、社内のITを管理・発注する側に立つ部署","顧客から請け負ってシステムを開発・納品するITサービス専門の会社","他社にエンジニアを派遣して現場に常駐させる人材サービスの会社","通信回線やデータセンターを保有して企業に貸し出す通信・基盤事業者","スマホ向けアプリを企画・開発して販売するソフトウェアメーカー"],"ans":"本業はITではない会社の中にあり、社内のITを管理・発注する側に立つ部署","ex":"情シスは食品メーカーや銀行など本業がITでない会社の社内IT部門で、外部に発注・管理する“発注する側”に立つことが多い。","why":"情シス出身者の立ち位置（作る側でなく発注・管理する側）を読み取る前提知識。"},{"id":"P2-002","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シスがSESやSIerから見たときの関係として正しいものはどれか。","opts":["システムを発注して費用を払う“お客様（発注者）”の側にあたる","エンジニアを供給してもらって作業を任せる“下請け”の側にあたる","同じプロジェクトに一緒に常駐して作業する“協力会社”にあたる","成果物の品質を客観的にチェックする“第三者の監査機関”にあたる","受けた作業の一部を別会社へ回す“二次請け”の業者にあたる"],"ans":"システムを発注して費用を払う“お客様（発注者）”の側にあたる","ex":"情シスは自分たちで作らず外部のIT企業に発注することが多く、SES・SIerにとっては発注者＝お客様の立場になる。","why":"情シス経験者が“作る側”でなく“依頼・管理する側”であることを理解する前提。"},{"id":"P2-003","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シスの代表業務「システム企画・導入」とは、主に何をする仕事か。","opts":["社内の課題を聞き取り、どんなシステムを入れれば解決するか考えて導入まで進める","外部ベンダーとの契約や見積りを精査し、進捗・品質・納期をまとめて管理する","社員からの「メールが送れない」などの困りごとに対応する社内の相談窓口を担う","サーバーやネットワークが止まらないよう日々点検し、安定して維持・管理する","PCやソフトのライセンスを台帳で管理し、定期的に数を棚卸しして把握する"],"ans":"社内の課題を聞き取り、どんなシステムを入れれば解決するか考えて導入まで進める","ex":"システム企画・導入は、業務課題のヒアリング・要件整理・製品選定・導入推進まで担う“企画”の役割。","why":"6業務の役割を取り違えず読み取るための前提知識。"},{"id":"P2-004","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シスの代表業務「ベンダー管理」とは、主に何をする仕事か。","opts":["外部のIT企業への発注・契約や、見積り精査・進捗・品質・納期の管理を行う","社内の課題を聞き取り、どんなシステムを入れて解決するか企画して導入を進める","社員からの問い合わせやPCトラブルに対応する社内の相談窓口を担当する","PC・スマホ・ソフトのライセンスを台帳で管理し、数を棚卸しして把握する","ウイルスや不正アクセス・情報漏えいから会社を守り、社員に注意を周知する"],"ans":"外部のIT企業への発注・契約や、見積り精査・進捗・品質・納期の管理を行う","ex":"ベンダー管理は依頼先に「いつまでに・いくらで・どんな品質で」を取り決め、進捗を管理する仕事。","why":"ベンダーコントロール経験の有無を読み取る前提知識。"},{"id":"P2-005","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シスの代表業務「ヘルプデスク・社内サポート」とは、主に何をする仕事か。","opts":["「メールが送れない」などの社員の困りごとに対応する社内の相談窓口を務める","システムを入れるための稟議・予算取りを進め、製品選定から導入まで推進する","外部ベンダーの見積りを精査し、複数社を比較・調整して発注先を決める","会社が持つPC・ソフトのライセンスを台帳化し、定期的に数を棚卸しする","あやしいメールへの注意喚起やインシデント対応など、社員向けの教育を行う"],"ans":"「メールが送れない」などの社員の困りごとに対応する社内の相談窓口を務める","ex":"ヘルプデスクは社員と接する機会が最も多い窓口業務で、未経験から入りやすい。","why":"ヘルプデスク中心か企画中心かで経験の幅が変わるため、役割の理解が前提になる。"},{"id":"P2-006","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シスの代表業務「社内インフラ運用」とは、主に何をする仕事か。","opts":["サーバー・ネットワーク・クラウドなどITの土台を止まらないよう維持・管理する","社内の要望を聞き取り、どんなシステムを入れて解決するかを企画し導入を進める","社員からの問い合わせやPCトラブルに対応する社内の相談窓口を担当する","PC・ソフトのライセンスを台帳で管理し、定期的に数を棚卸しして把握する","あやしいメールの注意喚起やインシデント対応など、社員向けの教育を行う"],"ans":"サーバー・ネットワーク・クラウドなどITの土台を止まらないよう維持・管理する","ex":"社内インフラ運用は日々の点検や容量・性能の管理、アカウント発行・権限管理、キッティング等を担う。","why":"インフラ運用経験の範囲を読み取る前提知識。"},{"id":"P2-007","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シスの代表業務「セキュリティ管理」とは、主に何をする仕事か。","opts":["ウイルスや不正アクセス・情報漏えいから会社を守り、社員に注意を周知する","サーバーやネットワークが止まらないよう日々点検し、安定して維持・管理する","社員からの問い合わせやPCトラブルに対応する社内の相談窓口を担当する","システム導入の稟議・予算取りを進め、製品選定から導入まで推進する","PC・ソフトのライセンスを台帳で管理し、定期的に数を棚卸しして把握する"],"ans":"ウイルスや不正アクセス・情報漏えいから会社を守り、社員に注意を周知する","ex":"セキュリティ管理は対策ソフト導入だけでなく、社員教育やインシデント対応も含む。","why":"セキュリティ担当の業務範囲を取り違えないための前提知識。"},{"id":"P2-008","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シスの代表業務「IT資産管理」とは、主に何をする仕事か。","opts":["PC・スマホ・ソフトのライセンスを台帳で管理し、誰が何を使うかを把握する","サーバーやネットワークが止まらないよう日々点検し、安定して維持・管理する","社員からの困りごとに対応する社内の相談窓口を務め、トラブルを記録する","外部ベンダーへの発注・契約や、見積り精査・進捗・納期の管理を行う","あやしいメールの注意喚起やインシデント対応など、社員向けの教育を行う"],"ans":"PC・スマホ・ソフトのライセンスを台帳で管理し、誰が何を使うかを把握する","ex":"IT資産管理は会社が持つ機器・ライセンスを台帳化し、定期的な棚卸し（数の確認）も行う。","why":"資産管理ツール経験の意味を読み取る前提知識。"},{"id":"P2-009","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シスが使う「Active Directory（AD）」は、どこが提供する何のための仕組みか。","opts":["Microsoftが提供する、社員アカウントと権限・ログインを一元管理する仕組み","SKYSEA社が提供する、PC・ソフトの台帳や操作ログを記録・管理するツール","Googleが提供する、メール・予定表・ファイル共有をまとめて使うグループウェア","Jamf社が提供する、Macなどの端末をまとめて設定・管理する端末管理ツール","各社が提供する、ウイルスや不正アクセスを検知して防ぐセキュリティ向けの製品"],"ans":"Microsoftが提供する、社員アカウントと権限・ログインを一元管理する仕組み","ex":"ADはMicrosoftの仕組みで、社員アカウント・権限・ログインをまとめて管理する。クラウド版はEntra ID。","why":"情シスのスキルシートで頻出。製品名→提供元・用途を結びつける前提知識。"},{"id":"P2-010","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「Microsoft Entra ID」とは、おおまかにどういう位置づけのものか。","opts":["Active Directoryのクラウド版にあたる、アカウント・権限・認証を管理する仕組み","Microsoft 365に含まれる、メール・予定表・ファイル共有をまとめたアプリ群","PCの操作ログを取得し、ソフトの台帳を管理するIT資産管理向けのツール","スマホの設定や紛失対策をまとめて行う端末管理（MDM）の製品にあたる","ウイルスや不正アクセスを検知・駆除するセキュリティ向けの対策ソフト"],"ans":"Active Directoryのクラウド版にあたる、アカウント・権限・認証を管理する仕組み","ex":"Entra IDはMicrosoftが提供するクラウド型のアカウント・権限・ログイン管理で、ADのクラウド版にあたる。","why":"ADとEntra IDの関係を読み取る前提知識。"},{"id":"P2-011","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シス用語の「MDM」とは何を指すか。","opts":["PCやスマホの設定配布や紛失対策をまとめて管理する端末管理の仕組み","社員アカウントと権限・ログインを一元管理する、認証のための仕組み","社内の問い合わせや障害対応を受け付け、記録して管理するツール","PC・ソフトのライセンスを台帳で管理し、定期的に棚卸しするツール","メール・予定表・ファイル共有をまとめて使えるグループウェアの仕組み"],"ans":"PCやスマホの設定配布や紛失対策をまとめて管理する端末管理の仕組み","ex":"MDM（端末管理）はPC・スマホの設定や紛失対策をまとめて管理する。代表例はIntune・Jamf。","why":"MDMという用語を業務イメージと結びつける前提知識。"},{"id":"P2-012","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「Microsoft Intune」や「Jamf」は、どの分類のツールか。","opts":["PC・スマホをまとめて設定・管理する端末管理（MDM）のツール","社員アカウント・権限・ログインを一元管理する認証管理のツール","PC・ソフトのライセンス台帳を管理するIT資産管理のツール","社内の問い合わせや障害対応を記録する問い合わせ管理のツール","ウイルスや不正アクセスを検知・駆除するセキュリティのツール"],"ans":"PC・スマホをまとめて設定・管理する端末管理（MDM）のツール","ex":"IntuneやJamfはMDM製品で、端末の設定配布や紛失対策などをまとめて行う。","why":"製品名→分類（MDM）を結びつける前提知識。"},{"id":"P2-013","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「Microsoft 365」や「Google Workspace」は、どういう用途のものか。","opts":["メール・予定表・ファイル共有など社内の基盤になるグループウェアの製品","社員アカウントと権限・ログインを一元管理する、認証のための仕組み","PC・スマホの設定配布や紛失対策をまとめて管理する端末管理のツール","PC・ソフトのライセンスを台帳で管理し、定期的に棚卸しするツール","ウイルスや不正アクセスを検知して防ぐ、セキュリティ向けの製品"],"ans":"メール・予定表・ファイル共有など社内の基盤になるグループウェアの製品","ex":"Microsoft 365・Google Workspaceはメール・予定表・ファイル共有など社内の基盤となるグループウェア。","why":"グループウェアの製品名と用途を結びつける前提知識。"},{"id":"P2-014","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「SKYSEA」や「LanScope」は、どの分類のツールか。","opts":["PC・ソフトの台帳管理や操作ログ取得を行うIT資産管理のツール","社員アカウント・権限・ログインを一元管理する認証管理のツール","PC・スマホの設定配布や紛失対策をまとめて行う端末管理（MDM）","メール・予定表・ファイル共有をまとめて使えるグループウェアの製品","社内の問い合わせや障害対応を受け付けて記録する問い合わせ管理"],"ans":"PC・ソフトの台帳管理や操作ログ取得を行うIT資産管理のツール","ex":"SKYSEAやLanScopeはIT資産管理ツールで、PC・ソフトの台帳管理や操作ログの取得に使う。","why":"製品名→分類（IT資産管理）を結びつける前提知識。"},{"id":"P2-015","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「ServiceNow」や「Zendesk」は、情シスでどの用途に使われるツールか。","opts":["社内の問い合わせ・障害対応を受け付けて記録し管理する問い合わせ管理","社員アカウントと権限・ログインを一元管理する認証管理のツール","PC・スマホをまとめて設定・管理する端末管理（MDM）のツール","PC・ソフトのライセンスを台帳で管理するIT資産管理のツール","ウイルスや不正アクセスを検知・駆除するセキュリティのツール"],"ans":"社内の問い合わせ・障害対応を受け付けて記録し管理する問い合わせ管理","ex":"ServiceNowやZendeskは問い合わせ管理ツールで、社内の問い合わせ・障害対応の記録と管理に使う。","why":"問い合わせ管理ツールの用途を読み取る前提知識。"},{"id":"P2-016","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"セキュリティ分野で出てくる「EDR」は、おおまかに何をするものか。","opts":["端末での不審な動きを検知して対処する、マルウェア対策・不正検知の仕組み","社員アカウントと権限・ログインを一元管理する、認証のための仕組み","PC・ソフトのライセンスを台帳で管理し、定期的に棚卸しする仕組み","メール・予定表・ファイル共有をまとめて使えるグループウェアの仕組み","スマホの設定配布や紛失対策をまとめて行う端末管理（MDM）の仕組み"],"ans":"端末での不審な動きを検知して対処する、マルウェア対策・不正検知の仕組み","ex":"EDRはウイルス対策やログ管理と並ぶセキュリティの仕組みで、不正検知・対処に使われる。","why":"セキュリティ系の用語を業務イメージに結びつける前提知識。"},{"id":"P2-017","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「守りの情シス」とは、どういう役割を指すか。","opts":["社内のITが止まらず安全に動き続けることを最優先する、従来からの役割","ITやデータを活用して会社の売上を伸ばしていく、攻めに転じた役割","システムを外部ベンダーに発注し、進行管理だけを担当する役割","社員からの問い合わせ窓口だけを専任で担う、社内サポートの役割","新しいPCをすぐ使える状態に整えて配る、キッティング中心の役割"],"ans":"社内のITが止まらず安全に動き続けることを最優先する、従来からの役割","ex":"守りの情シスは日々の運用・トラブル対応・コスト管理・セキュリティなど“会社を守る”仕事が中心。","why":"求人票で頻出の言い回しを読み取る前提知識。"},{"id":"P2-018","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「攻めの情シス」とは、どういう役割を指すか。","opts":["ITやデータを活用して売上を伸ばしたり業務を効率化する、DX推進などの役割","社内のITが止まらず安全に動き続けることを守る、従来からの守りの役割","外部ベンダーへの発注・契約や進捗・納期だけを管理する、調整役の役割","社員からの困りごとに対応する社内の相談窓口を専任で担当する役割","PC・ソフトの台帳を管理し、定期的に数を棚卸しして把握する役割"],"ans":"ITやデータを活用して売上を伸ばしたり業務を効率化する、DX推進などの役割","ex":"攻めの情シスはITで攻めに転じる役割で、求人票の「DX推進」「業務改革」がこれにあたることが多い。","why":"求人票の言い回しと役割を結びつける前提知識。"},{"id":"P2-019","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「DX（デジタルトランスフォーメーション）」とは、ここではどういう意味で使われるか。","opts":["ITを使って仕事のやり方そのものを大きく変えていく取り組みのこと","紙の書類をそのままスキャナーで読み取り、データとして保存すること","社内に置いたサーバーを、すべてクラウドへ移し替えていくこと","古くなったPCを、性能の良い新しいPCに順次買い替えていくこと","社員のアカウントや権限を、一つの仕組みでまとめて管理すること"],"ans":"ITを使って仕事のやり方そのものを大きく変えていく取り組みのこと","ex":"DXはITで仕事のやり方そのものを変える取り組みで、攻めの情シスが推進役になることが多い。","why":"求人票に頻出するDXの意味を理解する前提知識。"},{"id":"P2-020","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「一人情シス」とは、どういう体制・経験の特徴を指すか。","opts":["中小企業に多く、企画から運用・ヘルプデスクまで一人で広く浅くこなす体制","大企業に多く、領域ごとに専任が分かれて狭く深い経験を積んでいく体制","数名で役割を分担しながら複数領域を経験していく、バランス型の体制","社内には担当を置かず、運用業務をすべて外部の会社に任せている体制","セキュリティ専門のチームとして社内から独立して動いている体制"],"ans":"中小企業に多く、企画から運用・ヘルプデスクまで一人で広く浅くこなす体制","ex":"一人情シスは1人で全部こなすため広く浅く自走力が高い。高度・大規模の経験は積みにくい。","why":"どのタイプの情シス出身かで経験の幅を読み取る前提知識。"},{"id":"P2-021","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「大手の情シス」出身者にありがちな経験の特徴はどれか。","opts":["企画・インフラ・セキュリティなど領域ごとに専任で、担当が狭く深い傾向","一人で企画から運用・ヘルプデスクまで全部こなし、広く浅い経験になる傾向","運用業務をすべて外注に任せ、自分ではほとんど手を動かさない傾向","常に複数の会社を渡り歩き、特定の領域を持たずに経験を広げる傾向","開発言語を駆使してシステムそのものを作る、作る側に近い立場の傾向"],"ans":"企画・インフラ・セキュリティなど領域ごとに専任で、担当が狭く深い傾向","ex":"大手情シスは領域ごとに専任で専門性が深い一方、担当が限定的で“その領域しか知らない”こともある。","why":"「どの領域をどこまで」を確認すべき相手かを読み取る前提知識。"},{"id":"P2-022","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シス用語の「キッティング」とは何を指すか。","opts":["新しいPCをOS・ソフト・設定まで整え、すぐ使える状態にして配ること","社員のログインIDや利用権限を発行したり、変更・削除したりすること","外部の発注先（ベンダー）に依頼し、進捗や納期を管理していくこと","PC・ソフトのライセンスを台帳で管理し、定期的に数を棚卸しすること","あやしいメールへの注意喚起など、社員向けのセキュリティ教育を行うこと"],"ans":"新しいPCをOS・ソフト・設定まで整え、すぐ使える状態にして配ること","ex":"キッティングは新しいPCをすぐ使える状態にして配ること。社内インフラ運用でよく出る作業。","why":"スキルシートに出る用語を業務イメージに結びつける前提知識。"},{"id":"P2-023","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シス用語の「社内SE」とは、おおむねどういう意味か。","opts":["情シスとほぼ同義で、自社内のシステムを担当して支えるエンジニアのこと","顧客先に常駐してシステムを開発する、客先常駐型の派遣エンジニアのこと","システム開発会社に所属し、受託で開発を請け負って作るエンジニアのこと","社外向けのWebサービスを企画・運営して提供しているエンジニアのこと","ネットワーク機器の設計や設定だけを専門に扱う、技術寄りのエンジニア"],"ans":"情シスとほぼ同義で、自社内のシステムを担当して支えるエンジニアのこと","ex":"社内SEは情シスとほぼ同義で、社内のシステムを担当するエンジニアを指す。","why":"「社内SE」という肩書きの意味を読み取る前提知識。"},{"id":"P2-024","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「内製」と「外注」の違いとして正しいものはどれか。","opts":["内製は自分たちで作ること、外注は外部に発注して作ってもらうこと","内製は社外向けのシステム、外注は社内向けのシステムを作ること","内製はクラウド上で作り、外注はオンプレミス（自社設置）で作ること","内製は新規の開発を指し、外注はすでにある仕組みの保守だけを指すこと","内製は要件定義だけを自社で行い、外注は設計から先をすべて任せること"],"ans":"内製は自分たちで作ること、外注は外部に発注して作ってもらうこと","ex":"内製は自分たちで作る、外注は外部に発注して作ってもらうこと。情シスは外注が多い。","why":"情シスの作り方（内製/外注）を読み取る前提知識。"},{"id":"P2-025","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"情シス用語の「ベンダーコントロール」とは何を指すか。","opts":["外部の発注先（ベンダー）に依頼し、進捗・品質・納期を管理すること","社員のアカウントや利用権限を発行したり、変更・管理したりすること","社内ネットワークを流れる通信量を監視し、必要に応じて制御すること","ウイルス対策ソフトの設定を、全社の端末でまとめて一括管理すること","社員ごとにPCの利用できる時間を制限し、使い方を管理していくこと"],"ans":"外部の発注先（ベンダー）に依頼し、進捗・品質・納期を管理すること","ex":"ベンダーコントロールは外部の発注先（ベンダー）を管理すること。情シスの中心業務の一つ。","why":"ベンダー管理経験を読み取る前提知識。"},{"id":"P2-026","part":"Part 2 — 情シス（社内SE）","ch":"第5章","type":"choice","q":"「情報システム子会社」とは、どういう会社か。","opts":["大企業が情シス機能を分社化し、グループ各社のITをまとめて担う会社","顧客から不特定多数の開発を請け負って納品する、独立系のIT専門企業","エンジニアを他社に派遣して常駐させることだけを事業にしている会社","通信回線やデータセンターを保有し、企業に貸し出している基盤事業者","スマホ向けアプリを企画・開発して販売する、ソフトウェアのメーカー"],"ans":"大企業が情シス機能を分社化し、グループ各社のITをまとめて担う会社","ex":"情報システム子会社は大企業が情シス機能を分社化した会社で、グループ各社のITを担う。","why":"所属背景（情シス子会社）を読み取る前提知識。"},{"id":"P3-001","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"Webシステムの三層構成で、利用者の要求が処理されて返るまでの流れとして正しいのはどれか。","opts":["利用者 → Webサーバー → APサーバー → DBサーバー、応答は逆順で戻る","利用者 → DBサーバー → APサーバー → Webサーバー、応答は逆順で戻る","利用者 → APサーバー → DBサーバー → Webサーバー、応答は逆順で戻る","利用者 → Webサーバー → DBサーバー → APサーバー、応答は逆順で戻る","利用者 → DBサーバー → Webサーバー → APサーバー、応答は逆順で戻る"],"ans":"利用者 → Webサーバー → APサーバー → DBサーバー、応答は逆順で戻る","ex":"Webが受付、APが業務処理、DBがデータ保管。要求はこの順に流れ、応答は逆順で戻る。","why":"使用技術欄の言語/FW(AP側)とDB製品(DB側)が、どこで動くかを文脈で読むため。"},{"id":"P3-002","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"Webシステムの三層構成で、Webサーバーが主に担う役割はどれか。","opts":["利用者からの要求を受け付け、応答を返す“受付”の役割","業務上の計算や判断などの“処理”を行う中心の役割","データを整理して保管・取り出す“保管”の役割","ネットワーク機器の経路を制御し通信を中継する役割","利用者の端末側で画面を描画・操作させる役割"],"ans":"利用者からの要求を受け付け、応答を返す“受付”の役割","ex":"Webサーバーは受付役。処理はAPサーバー、保管はDBサーバーが担う。","why":"スキルシートの技術がどの層で動くかを、サーバーの役割から読み取るため。"},{"id":"P3-003","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"Webシステムの三層構成で、APサーバー（アプリケーションサーバー）が主に担う役割はどれか。","opts":["業務上の計算や判断などの“処理”を行う中心の役割","利用者からの要求を受け付け応答を返す“受付”の役割","データを整理して保管・取り出す“保管”の役割","画面のデザインをブラウザ側で描画する役割","回線の帯域を割り当て通信を中継する役割"],"ans":"業務上の計算や判断などの“処理”を行う中心の役割","ex":"APサーバーは業務処理の中心。言語やフレームワークが主に動くのもこの層。","why":"言語/FW欄がAP層で動く前提を理解し、業務処理の経験を読むため。"},{"id":"P3-004","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"Webシステムの三層構成で、DBサーバーが主に担う役割はどれか。","opts":["データを整理して保管し、必要なときに取り出す“保管”の役割","利用者からの要求を受け付け応答を返す“受付”の役割","業務上の計算や判断などの“処理”を行う中心の役割","利用者の端末側で画面を描画・操作させる役割","通信内容を暗号化して経路上の安全を守る役割"],"ans":"データを整理して保管し、必要なときに取り出す“保管”の役割","ex":"DBサーバーはデータの保管庫。受付はWeb、処理はAPが担う。","why":"DB製品欄がDB層で動く前提を理解し、データ操作の経験を読むため。"},{"id":"P3-005","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"クライアントとサーバーの関係の説明として正しいのはどれか。","opts":["クライアントがサービスを要求し、サーバーがそれに応えて応答を返す関係","サーバーがサービスを要求し、クライアントがそれに応えて応答を返す関係","クライアントとサーバーは互いに要求も応答もしない独立した関係","クライアントが必ずデータを保管し、サーバーは画面だけを表示する関係","サーバーは1台ごとに1人の利用者しか同時に扱えない関係"],"ans":"クライアントがサービスを要求し、サーバーがそれに応えて応答を返す関係","ex":"要求する側がクライアント、応える側がサーバー。Webブラウザとサーバーがこの関係。","why":"利用者側と裏側の技術の分担を、要求・応答の関係から読むため。"},{"id":"P3-006","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"言語・フレームワーク・DBがWebシステム上でどう組み合わさって動くかの説明として正しいのはどれか。","opts":["言語とフレームワークが主にAPサーバー上で処理を担い、DBサーバー上の製品とSQL等でやり取りして連携する","言語はWebサーバー、フレームワークはDBサーバー、DBはAPサーバーでそれぞれ独立して動き連携しない","言語・フレームワーク・DBはすべて利用者の端末（クライアント）上だけで動き、サーバーは使わない","DB製品が言語の代わりに業務処理を行い、言語はデータの保管だけを担って連携する","フレームワークがDBサーバーの代わりにデータを保管し、DB製品は画面表示を担って連携する"],"ans":"言語とフレームワークが主にAPサーバー上で処理を担い、DBサーバー上の製品とSQL等でやり取りして連携する","ex":"言語＋FWはAP層で処理を担当し、DB層のDB製品とやり取りする。3つはサーバー上で組み合わさって動く。","why":"使用技術欄の言語・FW・DBが互いにどう連携するかを文脈で読むため。"},{"id":"P3-007","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"フロントエンドが担当する範囲の説明として正しいのはどれか。","opts":["利用者が見る画面や操作する部分（見た目・操作性）","裏側で動く業務処理やデータの保管・連携の部分","ネットワーク機器の設定と日々の保守の部分","サーバーOSのインストールと運用・監視の部分","データベースの物理設計やチューニングの部分"],"ans":"利用者が見る画面や操作する部分（見た目・操作性）","ex":"フロントエンドは画面側。裏側の処理・データはバックエンドが担う。","why":"応募者の担当領域（画面側か裏側か）を技術から読み分けるため。"},{"id":"P3-008","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"バックエンドが担当する範囲の説明として正しいのはどれか。","opts":["裏側で動く業務処理・データの保管・他システムとの連携","利用者が見る画面の見た目やレイアウトの設計","ブラウザ内での画面の動きやアニメーションの実装","スマホ端末へのアプリの配信やストア申請の作業","紙の設計書や仕様書を作成するだけの事務作業"],"ans":"裏側で動く業務処理・データの保管・他システムとの連携","ex":"バックエンドは裏側の処理・データを担当。画面側はフロントエンド。","why":"言語＋FW＋SQLを使う裏側担当かどうかを読み分けるため。"},{"id":"P3-009","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"フルスタックエンジニアの説明として正しいのはどれか。","opts":["画面側（フロントエンド）と裏側（バックエンド）の両方を一通り担当できる","画面側（フロントエンド）の見た目まわりだけを専門に深く担当する","裏側（バックエンド）のサーバ処理だけを専門に深く担当する","ネットワーク機器の構築・運用だけを専門に深く担当する","データベースの設計・運用だけを専門に深く担当する"],"ans":"画面側（フロントエンド）と裏側（バックエンド）の両方を一通り担当できる","ex":"フルスタックは画面側と裏側の両方を扱う。深さの度合いは確認が必要。","why":"フルスタックを名乗る応募者の担当範囲を技術構成から読むため。"},{"id":"P3-010","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"フロントエンドで主に使われる技術の組み合わせとして正しいのはどれか。","opts":["JavaScript/TypeScript、React/Vue、HTML/CSS","Java、Spring Boot、Oracle Database、JSP","C#、ASP.NET Core、SQL Server、Azure","PHP、Laravel、MySQL、phpMyAdmin","COBOL、メインフレーム、JCL、PL/SQL"],"ans":"JavaScript/TypeScript、React/Vue、HTML/CSS","ex":"画面側はJS/TS＋React/Vueが中心。Java＋SpringやPHP＋Laravelは裏側の組み合わせ。","why":"技術の組み合わせから担当が画面側か裏側かを判断するため。"},{"id":"P3-011","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"「HTML/CSSが少しできる」ことと「フロントエンド開発ができる」ことの関係として正しいのはどれか。","opts":["両者はまったく別物で、フロントエンド開発は画面の動き・状態管理・性能まで含む専門領域である","両者は同じ意味で、HTML/CSSが少しできればフロントエンド開発も一通りできる","フロントエンド開発はHTML/CSSより簡単で、見た目を少し整えるだけの作業である","フロントエンド開発とはサーバーOSの導入・運用・監視を指す作業である","HTML/CSSが少しできれば、そのまま裏側のバックエンド開発も担当できる"],"ans":"両者はまったく別物で、フロントエンド開発は画面の動き・状態管理・性能まで含む専門領域である","ex":"フロントエンドは見た目だけでなく動き・状態管理・性能まで含む。TypeScriptやReact/Vueが必須レベル。","why":"スキルシートの表現が指す実力レベルを取り違えないため。"},{"id":"P3-012","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"Webアプリ（ブラウザで使うサービス）で典型的に使われる技術構成はどれか。","opts":["JavaScript/TS＋React等、Java/PHP/Python＋FW、RDB","C/C++と機器・ハードウェアの制御の知識のみ（組み込み系）","Swift（iOS）／Kotlin（Android）のみ（スマホアプリ系）","ExcelのVBAマクロや関数のみ（事務作業の自動化系）","COBOLとメインフレームのみ（金融などの基幹系の保守）"],"ans":"JavaScript/TS＋React等、Java/PHP/Python＋FW、RDB","ex":"Webアプリは画面側のJS/TS＋FW、裏側の言語＋FW、RDBの組み合わせが典型。","why":"作っていたアプリの種類を技術構成から推測するため。"},{"id":"P3-013","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"組み込み・制御系のアプリで主に使われる技術はどれか。","opts":["C/C++と機器・ハードウェアの知識（家電・自動車など）","JavaScript＋ReactとRDB（ブラウザ向けWeb系）","PHP＋Laravel（ECサイト・企業サイトの制作）","COBOLとメインフレーム（銀行などの基幹系）","ExcelのVBAマクロ（事務作業の自動化）"],"ans":"C/C++と機器・ハードウェアの知識（家電・自動車など）","ex":"家電・自動車などの組み込みはC/C++とハード知識が中心。Web系とは別スキル。","why":"アプリの種類が違うと技術が大きく異なる点を読み分けるため。"},{"id":"P3-014","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"「Webアプリの経験者」と「組み込み・スマホアプリの経験者」の関係として正しいのはどれか。","opts":["使う技術がかなり異なり、簡単には互いに行き来できない","使う技術がほぼ同じで、いつでも互いに置き換えられる","どちらも同じ言語だけを使うので、わざわざ区別する意味がない","Webアプリ経験者は自動的に組み込みアプリもそのまま担当できる","スマホアプリ経験者は必ずWebアプリもそのまま担当できる"],"ans":"使う技術がかなり異なり、簡単には互いに行き来できない","ex":"アプリの種類ごとに技術が大きく異なるため、案件のミスマッチに注意が必要。","why":"応募者の経験種別と配属候補案件のミスマッチを防ぐため。"},{"id":"P3-015","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"「Python」「PHP」などのスクリプト系の言語は、主にどんな用途で使われるか。","opts":["Webサイトの裏側の処理や、自動化・データ処理などで広く使われる","家電・自動車などの組み込み機器の制御に専ら使われる","銀行のメインフレーム基幹系の保守に専ら使われる","ブラウザ内の画面表示（フロントエンド）だけに使われる","ネットワーク機器の設定・運用だけに使われる"],"ans":"Webサイトの裏側の処理や、自動化・データ処理などで広く使われる","ex":"Python・PHP・JavaScriptなどはWebの裏側・自動化・データ処理で広く使われる。言語名から候補者が経験した案件の系統を推測できる。","why":"手軽さ重視の言語かどうかを動かし方から読むため。"},{"id":"P3-016","part":"Part 3 — 開発エンジニア","ch":"第6章","type":"choice","q":"「Java・C#」と「Python・JavaScript」は、主に使われる分野がどう違うか。","opts":["Java・C#は大規模・業務系、Python・JSはWeb裏側やデータ系に多い","どちらも使われる分野は完全に同じで、案件で区別する意味はない","どちらもフロントエンドの表示専用で、裏側の処理には使われない","どちらも組み込み機器の制御専用で、Web系の開発には使われない","どちらもデータベース製品の名前であって、開発言語ではない"],"ans":"Java・C#は大規模・業務系、Python・JSはWeb裏側やデータ系に多い","ex":"Java・C#は金融・官公庁・Windows業務系など大規模・業務系に多く、Python・JavaScriptはWeb裏側・データ・フロント系に多い。","why":"言語の手軽さと規模の限界を型の考え方から読むため。"},{"id":"P3-017","part":"Part 3 — 開発エンジニア","ch":"第7章","type":"choice","q":"Javaが長年もっとも多く使われてきた分野として、最も当てはまるのはどれか。","opts":["金融・官公庁・製造業などの大規模システム（基幹系）","Excelの定型作業を自動化するVBAマクロの分野","家電・自動車などの組み込み制御の分野","iPhone向けスマホアプリだけを作る専用の分野","データ分析・AIの研究を行う専用の分野"],"ans":"金融・官公庁・製造業などの大規模システム（基幹系）","ex":"Javaは静的型付けで大規模・基幹系に強い定番言語。SES求人も非常に多い。","why":"言語名から担当してきた分野・業界を推測するため。"},{"id":"P3-018","part":"Part 3 — 開発エンジニア","ch":"第7章","type":"choice","q":"C#は、どの分野で特に強い言語か。","opts":["Windowsを使う会社の業務システムや社内ツールの分野","ブラウザ内で動くフロントエンド表示だけの分野","銀行の古いメインフレームの保守だけの分野","データ分析・AIの研究を行う専用の分野","Excelの定型作業を自動化するマクロの分野"],"ans":"Windowsを使う会社の業務システムや社内ツールの分野","ex":"C#はMicrosoft製で、Windows系の業務システムに強い。ゲーム開発のUnityでも使われる。","why":"言語名からWindows業務系の経験を推測するため。"},{"id":"P3-019","part":"Part 3 — 開発エンジニア","ch":"第7章","type":"choice","q":"Pythonが「圧倒的に使われている」とされる分野はどれか。","opts":["データ分析・AI（人工知能）・機械学習の分野","ブラウザ内で動くフロントエンド表示の分野","家電・自動車などの組み込み制御の分野","Excelの定型作業を自動化するVBAマクロの分野","メインフレームの基幹系の保守・改修の分野"],"ans":"データ分析・AI（人工知能）・機械学習の分野","ex":"Pythonはデータ・AI分野で圧倒的。Web裏側や自動化にも使われる。","why":"Python経験がWeb系かデータ・AI系かを分けて読むため。"},{"id":"P3-020","part":"Part 3 — 開発エンジニア","ch":"第7章","type":"choice","q":"JavaScript／TypeScriptが「ほぼ唯一」動く場所として正しいのはどれか。","opts":["Webサイトを見るときのブラウザの中（フロントエンド）","データベースサーバーの内部だけ（DB層）","メインフレームの中だけ（基幹系）","スマホのハードウェア回路の中だけ（組み込み）","ネットワークルーターの中だけ（通信機器）"],"ans":"Webサイトを見るときのブラウザの中（フロントエンド）","ex":"JS/TSはブラウザ内で動くフロントエンドに欠かせない言語。名前は似てもJavaとは別物。","why":"フロントエンド担当かどうかを言語から読むため。"},{"id":"P3-021","part":"Part 3 — 開発エンジニア","ch":"第7章","type":"choice","q":"TypeScriptはどのような言語か。","opts":["JavaScriptに“型”のしくみを足し、より安全に大規模開発できるようにした言語","Javaに画面表示の機能を足し、ブラウザで動くようにした言語","Pythonにデータ分析の機能を足し、研究向けに強化した言語","COBOLを今風に書き直し、基幹系向けに作り変えた言語","C#をブラウザ用に変換し、フロントで動くようにした言語"],"ans":"JavaScriptに“型”のしくみを足し、より安全に大規模開発できるようにした言語","ex":"TypeScriptはJavaScriptに型を加えたもの。近年は標準的に使われる。","why":"フロントエンドのモダンな経験を言語名から読むため。"},{"id":"P3-022","part":"Part 3 — 開発エンジニア","ch":"第7章","type":"choice","q":"PHPが特化している分野として正しいのはどれか。","opts":["Webサイト（EC・企業サイト・WordPress等）の制作","家電・自動車などの組み込み機器の制御プログラムの開発","データ分析・AI（人工知能）分野の研究や開発の仕事","Excelの定型作業を自動化するマクロ作成の分野","メインフレーム上での基幹系処理の保守・改修"],"ans":"Webサイト（EC・企業サイト・WordPress等）の制作","ex":"PHPはWeb制作に特化。ECやWordPressで広く使われ、代表FWはLaravel。","why":"中小規模Web制作の経験を言語から読むため。"},{"id":"P3-023","part":"Part 3 — 開発エンジニア","ch":"第7章","type":"choice","q":"COBOLが今も現役で使われている分野として正しいのはどれか。","opts":["銀行・証券・保険・官公庁などの基幹システムの保守・改修","ブラウザ内で動くフロントエンド開発（画面側）","スマホ向けアプリの新規開発（iOS/Android）","データ分析・AI（人工知能）の最新研究の分野","Excelの定型作業を自動化するマクロの分野"],"ans":"銀行・証券・保険・官公庁などの基幹システムの保守・改修","ex":"COBOLは古い言語だが基幹系で現役。仕事は既存システムの保守・改修が中心で、経験者は希少。","why":"レガシー基幹系の希少な経験を言語から読むため。"},{"id":"P3-024","part":"Part 3 — 開発エンジニア","ch":"第7章","type":"choice","q":"レガシーとモダンの説明として正しいのはどれか。","opts":["長く使われてきた古い技術がレガシー、比較的新しく今の主流の技術がモダンである","比較的新しい今の主流がレガシー、長く使われてきた古い技術がモダンである","レガシーは必ず価値が低く役に立たず、モダンは必ず価値が高く役に立つ","レガシーとモダンは同じ意味で、呼び方が違うだけで実際の区別はない","レガシーはハードウェア全般を指し、モダンはソフトウェア全般を指す"],"ans":"長く使われてきた古い技術がレガシー、比較的新しく今の主流の技術がモダンである","ex":"COBOLやVB系はレガシー、TypeScript・Reactなどはモダンの代表。良し悪しではなく案件傾向の違い。","why":"応募者の経験がどちら寄りかを判断し配属を考えるため。"},{"id":"P3-025","part":"Part 3 — 開発エンジニア","ch":"第7章","type":"choice","q":"言語の数と深さに関する採用上の見方として正しいのはどれか。","opts":["1つの言語をフレームワーク・DB・Gitまで含めて深く扱えるほうが実務では評価されやすい","扱える言語名の数が多いほど、必ず即戦力として高く評価される傾向がある","言語は1つだけ知っていれば十分で、周辺技術の知識はまったく不要である","フレームワークやDBの知識は、言語そのものの評価とはまったく関係しない","広く浅く5言語を知っているほうが、どんな現場でも常に有利になる"],"ans":"1つの言語をフレームワーク・DB・Gitまで含めて深く扱えるほうが実務では評価されやすい","ex":"「広く浅く」より「深く1〜2言語＋周辺技術」が即戦力として見られやすい。","why":"言語の羅列だけでなく周辺技術込みの深さで評価するため。"},{"id":"P3-026","part":"Part 3 — 開発エンジニア","ch":"第8章","type":"choice","q":"フレームワークとは何かの説明として正しいのはどれか。","opts":["共通機能を部品としてそろえ、決められた作法で組み立てられる“開発の土台一式”","必要なときだけ呼び出して使う、特定機能を補う単独の部品の集まり","データをきちんと整理して保存し、必要なときに取り出すための保管庫","プログラムの変更の履歴を記録・管理し、以前の状態に戻せる仕組み","利用者が実際に見て操作する、ブラウザ上の画面そのものの部分"],"ans":"共通機能を部品としてそろえ、決められた作法で組み立てられる“開発の土台一式”","ex":"FWは開発の土台一式。画面表示・DB接続・認証など共通機能をあらかじめ用意し、開発を速く頑丈にする。","why":"FW名から実務の慣れと開発の進め方を読むため。"},{"id":"P3-027","part":"Part 3 — 開発エンジニア","ch":"第8章","type":"choice","q":"フレームワークとライブラリの違いとして正しいのはどれか。","opts":["フレームワークは開発全体の流れを主導し、ライブラリは部分的に機能を手伝う部品である","ライブラリが開発全体の流れを主導し、フレームワークが部分的に手伝う部品である","フレームワークとライブラリは同じ意味で、呼び方が違うだけで実際の違いはない","フレームワークはデータの保管を担い、ライブラリは画面表示を担う仕組みである","ライブラリは言語そのものを指し、フレームワークはDB製品そのものを指す"],"ans":"フレームワークは開発全体の流れを主導し、ライブラリは部分的に機能を手伝う部品である","ex":"FWは骨組みを主導、ライブラリは必要なときに呼び出す部品。主導するか手伝うかが違い。","why":"スキルシートのFWとライブラリを取り違えないため。"},{"id":"P3-028","part":"Part 3 — 開発エンジニア","ch":"第8章","type":"choice","q":"Javaの代表的なフレームワークの組み合わせとして正しいのはどれか。","opts":["Java と Spring Boot / Spring","Java と Laravel / CakePHP","Java と Django / Flask","Java と React / Vue","Java と Ruby on Rails / Sinatra"],"ans":"Java と Spring Boot / Spring","ex":"JavaのFWはSpring Boot/Spring。LaravelはPHP、DjangoはPython、RailsはRuby。","why":"言語とFWの正しい組み合わせを読み分けるため。"},{"id":"P3-029","part":"Part 3 — 開発エンジニア","ch":"第8章","type":"choice","q":"PHPの代表的なフレームワークの組み合わせとして正しいのはどれか。","opts":["PHP と Laravel / CakePHP","PHP と Spring Boot / Spring","PHP と Django / Flask","PHP と Ruby on Rails / Sinatra","PHP と React / Vue"],"ans":"PHP と Laravel / CakePHP","ex":"PHPの代表FWはLaravel。SpringはJava、DjangoはPython、RailsはRuby。","why":"言語とFWの正しい組み合わせを読み分けるため。"},{"id":"P3-030","part":"Part 3 — 開発エンジニア","ch":"第8章","type":"choice","q":"Pythonの代表的なフレームワークの組み合わせとして正しいのはどれか。","opts":["Python と Django / FastAPI / Flask","Python と Laravel / CakePHP","Python と Spring Boot / Spring","Python と Ruby on Rails / Sinatra","Python と React / Vue"],"ans":"Python と Django / FastAPI / Flask","ex":"PythonのWeb系FWはDjango・FastAPI・Flask。LaravelはPHP、SpringはJava。","why":"言語とFWの正しい組み合わせを読み分けるため。"},{"id":"P3-031","part":"Part 3 — 開発エンジニア","ch":"第8章","type":"choice","q":"JavaScriptで主に使われるフレームワーク／ライブラリの組み合わせとして正しいのはどれか。","opts":["JavaScript と React / Vue / Angular","JavaScript と Spring Boot / Spring","JavaScript と Laravel / CakePHP","JavaScript と Django / Flask","JavaScript と Ruby on Rails / Sinatra"],"ans":"JavaScript と React / Vue / Angular","ex":"JSのフロントエンド系はReact・Vue・Next.js・Angular。Spring/Laravel/Djangoは裏側の言語のFW。","why":"フロントエンド技術を言語とFWの組み合わせから読むため。"},{"id":"P3-032","part":"Part 3 — 開発エンジニア","ch":"第8章","type":"choice","q":"「言語＋フレームワーク」がセットで書けている応募者についての見方として正しいのはどれか。","opts":["言語だけより実務経験が濃い傾向があり、具体性が高く好印象である","言語だけを書いているほうが、必ず実務経験が深いと判断できる","フレームワーク名が書けているかどうかは、経験の深さとは無関係である","セットで書けていると、かえって学習レベルにとどまると判断できる","フレームワーク名が多いほど、画面側の専門家だと確定して判断できる"],"ans":"言語だけより実務経験が濃い傾向があり、具体性が高く好印象である","ex":"「Java（Spring Boot）3年」のように言語＋FWが具体的だと実務経験が濃い傾向。言語だけだと学習レベルを疑う。","why":"スキルシートの具体性から実務経験の濃さを読むため。"},{"id":"P3-033","part":"Part 3 — 開発エンジニア","ch":"第9章","type":"choice","q":"データベース（DB）とは何かの説明として正しいのはどれか。","opts":["データをきちんと整理して保存し、必要なときに取り出す仕組み","利用者が見る画面を描画して操作させるための仕組み","プログラムの変更の履歴を記録・管理する仕組み","業務上の計算や判断などの処理を行う言語そのもの","ネットワークの通信経路を制御して中継する機器"],"ans":"データをきちんと整理して保存し、必要なときに取り出す仕組み","ex":"DBはデータの整理された保管庫。顧客情報や注文履歴などを保存・取り出しする。","why":"DB欄からデータ保管・取り出しの経験を読むため。"},{"id":"P3-034","part":"Part 3 — 開発エンジニア","ch":"第9章","type":"choice","q":"RDB（リレーショナルデータベース）がデータを管理する形として正しいのはどれか。","opts":["「表（テーブル）」の形で行と列に整理して管理する","画像ファイルそのものの形だけで並べて管理する","変更の履歴を記録したログの形で時系列に管理する","画面のレイアウト（部品の配置）の形で管理する","音声データそのものの形で並べて管理する"],"ans":"「表（テーブル）」の形で行と列に整理して管理する","ex":"RDBはExcelのシートのような表の形でデータを管理する、もっとも広く使われるDB。","why":"RDB経験の有無をデータ管理形式から読むため。"},{"id":"P3-035","part":"Part 3 — 開発エンジニア","ch":"第9章","type":"choice","q":"SQLとは何かの説明として正しいのはどれか。","opts":["RDBを操作してデータを取り出したり登録したりするための専用の言葉","利用者が見る画面のデザインや配置を記述するための専用の言葉","プログラムの変更の履歴を記録・管理するための専用の道具","サーバーOSを起動したり停止したりするための命令の集まり","ネットワーク機器の経路や設定を指定するための専用の言語"],"ans":"RDBを操作してデータを取り出したり登録したりするための専用の言葉","ex":"SQLはRDBを操作する専用の言葉。条件に合うデータの取り出しや登録などを指示する。","why":"DB操作（SQL）の経験を読むため。"},{"id":"P3-036","part":"Part 3 — 開発エンジニア","ch":"第9章","type":"choice","q":"次のうち、RDB（リレーショナルデータベース）の製品の組み合わせとして正しいのはどれか。","opts":["Oracle Database と MySQL","Redis と MongoDB（NoSQL製品）","React と Vue（JSのフロント技術）","Spring Boot と Laravel（言語のFW）","Zabbix と Nagios（監視ツール）"],"ans":"Oracle Database と MySQL","ex":"Oracle・SQL Server・MySQL・PostgreSQLは表でデータを管理する代表的なRDB。Redis・MongoDBはNoSQL、Spring・Laravelはフレームワーク。","why":"DB製品の種類と提供形態を読み分けるため。"},{"id":"P3-037","part":"Part 3 — 開発エンジニア","ch":"第9章","type":"choice","q":"NoSQLとRDBの違いの説明として正しいのはどれか。","opts":["NoSQLは表の形に収まらないデータを柔軟・高速に扱う“もう一つの選択肢”で、RDBを置き換えるものではない","NoSQLはRDBの新しいバージョンであり、いずれRDBを完全に置き換えていくものである","NoSQLは表の形に厳密に収め、行と列でデータを管理する仕組みのことである","NoSQLはSQLという言葉しか使えないDBの総称で、表の操作に特化している","NoSQLは利用者が見る画面を描画して操作させるための仕組みのことである"],"ans":"NoSQLは表の形に収まらないデータを柔軟・高速に扱う“もう一つの選択肢”で、RDBを置き換えるものではない","ex":"NoSQLは表に収まらないデータを柔軟・高速に扱う選択肢。RDBの置き換えではなく使い分ける。","why":"DB欄のNoSQLとRDBの役割の違いを読み分けるため。"},{"id":"P3-038","part":"Part 3 — 開発エンジニア","ch":"第9章","type":"choice","q":"次のうち、NoSQLに分類されるものの組み合わせとして正しいのはどれか。","opts":["Redis（KVS）と MongoDB（ドキュメント型）","Oracle Database と SQL Server（RDB製品）","MySQL と PostgreSQL（RDB製品）","Spring Boot と Laravel（言語のFW）","React と Vue（JSのフロント技術）"],"ans":"Redis（KVS）と MongoDB（ドキュメント型）","ex":"RedisはKVS、MongoDBはドキュメント型でいずれもNoSQL。Oracle・SQL Server・MySQL・PostgreSQLは表で管理するRDB。","why":"DB製品がRDBかNoSQLかを読み分けるため。"},{"id":"P3-039","part":"Part 3 — 開発エンジニア","ch":"第9章","type":"choice","q":"SQLの実務レベルの分かれ目とされる「結合（JOIN）」の説明として正しいのはどれか。","opts":["複数の表を組み合わせて、関連するデータをまとめて取り出すこと","1つの表からデータを1件だけ条件で取り出すこと","データを暗号化して読めない形にして保存すること","表そのものを画像ファイルに変換して出力すること","DBサーバーを停止してから再び起動し直すこと"],"ans":"複数の表を組み合わせて、関連するデータをまとめて取り出すこと","ex":"JOIN（結合）は複数の表を組み合わせて取り出す操作。これができるかが実務レベルの一つの分かれ目。","why":"SQLの習熟度（実務レベルか）を読むため。"},{"id":"P3-040","part":"Part 3 — 開発エンジニア","ch":"第10章","type":"choice","q":"バージョン管理ツールのGitとは何かの説明として正しいのはどれか。","opts":["プログラムの「変更の履歴」を記録・管理し、以前の状態に戻せる仕組み","データを表の形で整理して保管・取り出しするためのDB製品","利用者が見る画面を描画して操作させるためのフレームワーク","業務上の計算や判断などの処理を行う言語そのものの一種","ネットワーク機器の経路や設定を指定するための専用の道具"],"ans":"プログラムの「変更の履歴」を記録・管理し、以前の状態に戻せる仕組み","ex":"Gitは変更履歴を記録する仕組み。誰がどこを変えたか残せ、複数人開発で力を発揮する必須の道具。","why":"チーム開発の基盤（Git）の経験を読むため。"},{"id":"P3-041","part":"Part 3 — 開発エンジニア","ch":"第10章","type":"choice","q":"GitHubとGitの関係として正しいのはどれか。","opts":["GitHubはGitで管理したプログラムを保管・共有しておく置き場所である","GitHubはGitとは無関係な、画面のデザインを作るためのツールである","GitHubはGitの前の世代にあたる、より古い変更管理の仕組みである","GitHubはデータを表の形で保管・取り出しするためのDB製品である","GitHubはプログラムを書くための言語の一種で、Gitとは別物である"],"ans":"GitHubはGitで管理したプログラムを保管・共有しておく置き場所である","ex":"GitHubやGitLabはGitで管理したコードの置き場所。Gitの前世代はSVN。","why":"Gitとその置き場所の役割を読み分けるため。"},{"id":"P3-042","part":"Part 3 — 開発エンジニア","ch":"第10章","type":"choice","q":"Gitの基本的な使い方（ブランチ運用）の説明として正しいのはどれか。","opts":["本流（main）から作業用の枝（feature）を分け、作業後に合流（merge）させる","本流（main）をいったん消してから、作業用の枝だけで開発を続けていく","枝を一切分けず、必ず全員が同じ1か所のファイルだけを直接書き換える","作業用の枝を作ったら、その枝は本流に決して合流させずに使い続ける","ブランチごとに別々の言語で書かなければならない決まりに従って進める"],"ans":"本流（main）から作業用の枝（feature）を分け、作業後に合流（merge）させる","ex":"本流から枝を分けて作業し、後で合流させるのがGitの基本。複数人開発の衝突を上手に管理する。","why":"ブランチ運用の経験をチーム開発の深さとして読むため。"},{"id":"P3-043","part":"Part 3 — 開発エンジニア","ch":"第10章","type":"choice","q":"CI/CDとは何を指すかの説明として正しいのはどれか。","opts":["変更のたびに自動でテストし、問題なければ自動で反映する一連の流れを仕組み化したもの","変更の履歴を一件ずつ手作業で台帳に書き写して記録していく作業のこと","データを表の形で整理して保管し、必要なときに取り出す仕組みのこと","利用者が見る画面のデザインや配置を描いて整えていく作業のこと","ネットワーク機器を物理的に配線してつなぎ、経路を作る作業のこと"],"ans":"変更のたびに自動でテストし、問題なければ自動で反映する一連の流れを仕組み化したもの","ex":"CI/CDはテストと反映の自動化。馴染みがある応募者はモダンな現場を経験してきたと推測できる（Jenkins、GitHub Actions）。","why":"モダンな開発環境の経験をツールから読むため。"},{"id":"P3-044","part":"Part 3 — 開発エンジニア","ch":"第10章","type":"choice","q":"課題・プロジェクト管理ツールの組み合わせとして正しいのはどれか。","opts":["Redmine・Backlog・Jira","React・Vue・Angular（JSのフロント技術）","Oracle・MySQL・PostgreSQL（DB製品）","Spring Boot・Laravel・Django（言語のFW）","VS Code・Visual Studio・IntelliJ（開発エディタ）"],"ans":"Redmine・Backlog・Jira","ex":"課題・プロジェクト管理はRedmine・Backlog・Jiraが定番。チーム開発の経験の手がかりになる。","why":"課題管理ツールの利用からチーム開発の経験を読むため。"},{"id":"P4-001","part":"Part 4 — インフラエンジニア","ch":"第11章","type":"choice","q":"ITインフラの「サーバー」とは、おおまかに何を指すか。","opts":["Webサイトやアプリなどのサービスがのって動き、利用者に提供する側のコンピュータ","コンピュータ同士や利用者と機械をつなぐ、データが通るための通信の道のこと","写真や顧客情報などのデータを、必要なときまで保存しておくための専用の装置","機械の部品とアプリの間に立って全体を動かす、最も基本となる土台のソフト","機械を自前で持たず、必要な分だけ事業者から借りて使う、新しい利用形態"],"ans":"Webサイトやアプリなどのサービスがのって動き、利用者に提供する側のコンピュータ","ex":"サーバーは何らかのサービス（アプリやサイト）がのって動き、依頼に応えて提供する側のコンピュータ。通信の道はネットワーク、保存は装置（ストレージ）、土台ソフトはOS。","why":"スキルシートに『サーバー』とあれば、働くコンピュータ本体を扱った人だと読める。"},{"id":"P4-002","part":"Part 4 — インフラエンジニア","ch":"第11章","type":"choice","q":"「ミドルウェア」の位置づけとして正しいものはどれか。","opts":["OSとアプリの中間で、多くのアプリが共通して必要とする機能を提供する土台ソフト","機械全体を動かす最も基本となるソフトで、部品とアプリの仲立ちをする土台のこと","写真や顧客情報などのデータを、必要なときまで保存しておくための物理的な装置","異なる場所にある機械同士をつなぎ、データの通り道を案内する役割の通信機器","機械を自前で持たず、必要な分だけ事業者から借りて使う、新しい利用の形態"],"ans":"OSとアプリの中間で、多くのアプリが共通して必要とする機能を提供する土台ソフト","ex":"ミドルウェアはOSとアプリの『中間』で共通機能を肩代わりするソフト。最も基本のソフトはOS。","why":"スキルシートにミドルウェア製品名があれば、OSとアプリの間の土台ソフトを扱った人だと読める。"},{"id":"P4-003","part":"Part 4 — インフラエンジニア","ch":"第11章","type":"choice","q":"「オンプレミス」とは、どのような持ち方か。","opts":["会社が自前で機械を買い、自分たちの施設に置いて自分たちで運用するやり方","会社が機械を自前で買わず、事業者から必要な分だけ借りて使う、新しいやり方","OSやアプリの動作環境まで一式用意された状態を、事業者から借りて使う利用形態","事業者が完成させて提供するソフトを、自分で用意せずそのまま使う利用形態","1台の機械の中に複数の仮想的なサーバーを同居させて、無駄なく使う技術のこと"],"ans":"会社が自前で機械を買い、自分たちの施設に置いて自分たちで運用するやり方","ex":"オンプレミスは自前で機器を持つやり方。借りて使うのがクラウド。両者の対比は面接で頻出。","why":"スキルシートでオンプレ経験が長いか確認すると、配属先を考える材料になる。"},{"id":"P4-004","part":"Part 4 — インフラエンジニア","ch":"第11章","type":"choice","q":"銀行・保険・官公庁などで、クラウドが普及した今もオンプレミスが根強く使われる主な理由はどれか。","opts":["絶対に止められず、外に出すことも許されない重要なデータを扱う必要があるため","機械を買わず借りるので、最初にかかる費用を小さく抑えることができるため","利用者の増減に合わせて、必要な性能をその場ですぐ増やしたり減らしたりできるため","機械の置き場所や故障対応などの管理を、自分たちでしなくて済むようになるため","機械を自前で持たず借りる形のため、毎月の利用料が一切かからなくなるため"],"ans":"絶対に止められず、外に出すことも許されない重要なデータを扱う必要があるため","ex":"重要で外に出せないデータを扱う分野はオンプレが根強い。初期費用が小さい・性能を増減しやすいのはクラウドの利点。","why":"応募者の経験がオンプレ寄りかクラウド寄りかは、扱える業界の見立てにつながる。"},{"id":"P4-005","part":"Part 4 — インフラエンジニア","ch":"第13章","type":"choice","q":"「OS（オペレーティングシステム）」の役割として正しいものはどれか。","opts":["機械の部品とその上で動くソフトの間を取り持つ、最も基本となるソフト","利用者のアクセスを受け付けて、画面や画像を返す入口の役割を担う土台ソフト","写真や顧客情報などのデータを、保管したり求めに応じて取り出したりするソフト","たくさんの機械を1つの画面でまとめて監視したり操作したりするための道具","集まってきたアクセスを、複数の機械へ振り分けて負担を散らすための機器"],"ans":"機械の部品とその上で動くソフトの間を取り持つ、最も基本となるソフト","ex":"OSは機械とソフトの仲立ちをする土台の基本ソフト。受付や保管はミドルウェアの役割。","why":"スキルシートのOS欄から、どんな土台で作業した人かを読み取れる。"},{"id":"P4-006","part":"Part 4 — インフラエンジニア","ch":"第13章","type":"choice","q":"サーバー用OS「Windows Server」の特徴として正しいものはどれか。","opts":["Microsoft製で、マウスで画面を操作でき、社員アカウント管理(AD)や社内の業務システムと相性がよい","サーバー用途、特にWebサーバーで最もよく使われ、軽く安定して動くOSである","歴史が古く堅牢で、金融や基幹系の止められないシステムで長く使われてきたOSである","OSとアプリの中間で動き、多くのアプリが共通して使う機能を提供する土台ソフトである","たくさんの機械を1か所からまとめて監視・操作する司令塔の役割を担うソフトである"],"ans":"Microsoft製で、マウスで画面を操作でき、社員アカウント管理(AD)や社内の業務システムと相性がよい","ex":"Windows ServerはMicrosoft製でGUI中心、社員アカウント管理(AD)や社内の業務システムと好相性。サーバー用途で広く使われるのはLinux。","why":"スキルシートに『Windows Server』とあれば、画面操作中心・社内システム寄りの経験が読める。"},{"id":"P4-007","part":"Part 4 — インフラエンジニア","ch":"第13章","type":"choice","q":"サーバー用OS「Linux」の特徴として正しいものはどれか。","opts":["サーバー用途、特にWebサーバーで最もよく使われ、軽く安定して動くOSである","Microsoft製で、画面操作が中心、社内の業務システムやAD管理と相性がよいOSである","歴史の古い堅牢なOSで、金融や基幹系の止められないシステムで長く使われてきたOSである","OSとアプリの中間で動き、多くのアプリが共通して使う機能を提供する土台ソフトである","たくさんの機械を1つの画面でまとめて監視・操作する司令塔の役割を担うソフトである"],"ans":"サーバー用途、特にWebサーバーで最もよく使われ、軽く安定して動くOSである","ex":"Linuxはサーバー用途、特にWebサーバーで最もよく使われるOS。画面操作中心でMicrosoft製はWindows Server、堅牢な基幹系はUNIX。","why":"スキルシートに『Linux』とあれば、サーバー用途の標準OSを扱った人だと読める。"},{"id":"P4-008","part":"Part 4 — インフラエンジニア","ch":"第13章","type":"choice","q":"「UNIX（AIX・Solaris・HP-UX など）」についての説明として正しいものはどれか。","opts":["Linuxの先祖にあたる歴史の古いOSで、金融や基幹系の堅牢なシステムで長く使われてきた","Microsoft製で、マウスで画面を見ながら操作するやり方が中心のサーバー用OSである","サーバー用途、特にWebサーバーで最もよく使われる、軽く安定したサーバー用OSである","OSとアプリの中間で動き、多くのアプリが共通して使う機能を提供する土台ソフトである","たくさんの機械を1つの画面でまとめて監視・操作するための統合的な管理ツールである"],"ans":"Linuxの先祖にあたる歴史の古いOSで、金融や基幹系の堅牢なシステムで長く使われてきた","ex":"UNIXは歴史が古く堅牢なOSで、金融など基幹系の保守現場で今も登場する。サーバーで広く使われるのはLinux。","why":"スキルシートにUNIX系の経験があれば、古い基幹系の保守を担えた人だと読める。"},{"id":"P4-009","part":"Part 4 — インフラエンジニア","ch":"第14章","type":"choice","q":"「クライアント・サーバーモデル」での、サーバーとクライアントの役割の組み合わせとして正しいものはどれか。","opts":["サービスを提供する側がサーバー、利用する側がクライアント","データを保存しておく側がサーバー、計算の仕事をこなす側がクライアント","通信の道を案内する機器がサーバー、機器同士をつなぐケーブルがクライアント","機械を貸す事業者がサーバー、機械を置いている施設のほうがクライアント","最も基本となる土台ソフトがサーバー、共通機能を提供する土台がクライアント"],"ans":"サービスを提供する側がサーバー、利用する側がクライアント","ex":"提供する側がサーバー、利用する側（PCやスマホ）がクライアント。お願いと応答の往復が基本。","why":"基本のやり取りの形を理解しているかで、構成の説明についていけるか判断できる。"},{"id":"P4-010","part":"Part 4 — インフラエンジニア","ch":"第14章","type":"choice","q":"Webシステムの三層構造で「Webサーバー」が担う役割はどれか。","opts":["利用者のアクセスを受け付け、画面や画像を返し、要求を奥へ取り次ぐ入口","在庫の確認や金額の計算といった、システムの中心となる業務処理を行う頭脳","写真や顧客情報などのデータを保管し、求めに応じて取り出して返す役割を担う","社内の社員アカウントや使うPCを、まとめて一元的に管理する名簿の役割を担う","人が覚えやすい名前を、機械が使う住所のような番号へ変換する役割を担う"],"ans":"利用者のアクセスを受け付け、画面や画像を返し、要求を奥へ取り次ぐ入口","ex":"Webサーバーは入口で受付と画面表示を担う。業務処理＝AP、データ保管＝DBと役割が分かれる。","why":"スキルシートのWeb/AP/DBの区別から、三層のどこを担当した人かを読み取れる。"},{"id":"P4-011","part":"Part 4 — インフラエンジニア","ch":"第14章","type":"choice","q":"Webシステムの三層構造で「APサーバー（アプリケーションサーバー）」が担う役割はどれか。","opts":["合計金額の計算や在庫確認などの、システムの中心となる業務処理を行う頭脳","利用者のアクセスを受け付け、画面や画像を返し、要求を奥へ取り次ぐ入口の役割","写真や顧客情報などのデータを保管し、求めに応じて取り出して返す役割を担う","集まってきた利用者を、どの機械へ振り分けて応対させるかを決める役割を担う","人が覚えやすい名前を、機械が使う住所のような番号へ変換する役割を担う"],"ans":"合計金額の計算や在庫確認などの、システムの中心となる業務処理を行う頭脳","ex":"APサーバーは業務処理を行う頭脳。入口＝Web、データ保管＝DB。","why":"スキルシートに『AP』とあれば、業務処理の土台を扱った人だと読める。"},{"id":"P4-012","part":"Part 4 — インフラエンジニア","ch":"第14章","type":"choice","q":"「AD（Active Directory）サーバー」の役割として正しいものはどれか。","opts":["社内の社員アカウントや使うPCを、まとめて一元的に管理する名簿システム","人が覚えやすい名前を、機械が使う住所のような番号へ変換する役割を担う","会社の内外にやり取りされるメールを、送ったり受け取ったりする役割を担う","写真や顧客情報などのデータを保管し、求めに応じて取り出して返す役割を担う","集まってきたアクセスを、複数の機械へ振り分けて負担を散らす役割を担う"],"ans":"社内の社員アカウントや使うPCを、まとめて一元的に管理する名簿システム","ex":"ADは社内アカウントとPCを一元管理する名簿で、一度のログインで複数システムを使えるようにする。名前から番号への変換はDNS。","why":"スキルシートにAD経験があれば、Windows社内インフラの中心を扱えた人だと読める。"},{"id":"P4-013","part":"Part 4 — インフラエンジニア","ch":"第14章","type":"choice","q":"次のサーバーの役割の組み合わせのうち、正しいものはどれか。","opts":["メールサーバーはメールの送受信、ファイルサーバーは社内の文書共有・保管を担う","メールサーバーはデータの保管、ファイルサーバーはメールの送受信を担う","プロキシサーバーはデータの保管管理、ファイルサーバーは負担を散らす役割を担う","メールサーバーは負担を散らす役割、プロキシサーバーはメールの送受信を担う","ファイルサーバーは社員アカウント管理、メールサーバーは名前から番号への変換を担う"],"ans":"メールサーバーはメールの送受信、ファイルサーバーは社内の文書共有・保管を担う","ex":"メール＝郵便局、ファイル＝共有書庫、プロキシ＝外部通信を中継する関所と役割が分かれる。","why":"役割ごとの呼び名が分かると、構成図や経歴の説明を読み解ける。"},{"id":"P4-014","part":"Part 4 — インフラエンジニア","ch":"第15章","type":"choice","q":"「Webサーバーソフト」の代表例の組み合わせとして正しいものはどれか。","opts":["Apache・nginx・IIS","Tomcat・WebLogic・WebSphere","Oracle・MySQL・PostgreSQL","JP1・Systemwalker・WebSAM","Zabbix・Nagios・Datadog"],"ans":"Apache・nginx・IIS","ex":"通信を受け付け画面を返すWebサーバーソフトはApache・nginx・IIS。Tomcat系はAPサーバー、Oracle系はDBMS。","why":"スキルシートのWebサーバーソフト名から、どの受付窓口を扱った人かを読み取れる。"},{"id":"P4-015","part":"Part 4 — インフラエンジニア","ch":"第15章","type":"choice","q":"「APサーバーソフト」の代表例の組み合わせとして正しいものはどれか。","opts":["Tomcat・WebLogic・WebSphere","Apache・nginx・IIS","MySQL・PostgreSQL・Oracle","Zabbix・Nagios・CloudWatch","Ansible・Terraform・Docker"],"ans":"Tomcat・WebLogic・WebSphere","ex":"アプリのプログラムを動かす土台がAPサーバーソフト（Tomcat等）。受付窓口はWebサーバーソフト、データ管理はDBMS。","why":"スキルシートのAPサーバーソフト名から、アプリ実行基盤を扱った人かを読み取れる。"},{"id":"P4-016","part":"Part 4 — インフラエンジニア","ch":"第15章","type":"choice","q":"「DBMS（データベース管理ソフト）」にあたる製品の組み合わせはどれか。","opts":["Oracle・SQL Server・MySQL・PostgreSQL","Apache・nginx・Tomcat・IIS","JP1・Systemwalker・WebSAM・MasterScope","VMware・Hyper-V・KVM・Docker","Zabbix・Nagios・Datadog・CloudWatch"],"ans":"Oracle・SQL Server・MySQL・PostgreSQL","ex":"データの保管・管理を担うミドルウェアがDBMS。WebサーバーソフトやAPサーバーソフトとは別物。","why":"スキルシートのDBMS名から、データ管理ソフトを扱った人だと読める。"},{"id":"P4-017","part":"Part 4 — インフラエンジニア","ch":"第16章","type":"choice","q":"「統合運用管理ツール」とは、おおまかに何をする道具か。","opts":["多数のサーバーを1つの画面でまとめて監視・操作・管理できるようにする道具","1台の機械の中に複数の仮想的なサーバーを同居させ、機械を無駄なく使う技術","人が覚えやすい名前を、機械が使う住所のような番号へ変換するための仕組み","集まってきたアクセスを、複数の機械へ振り分けて負担を散らすための機器","写真や顧客情報などの大事なデータを、読めない形に変えて保存しておく装置"],"ans":"多数のサーバーを1つの画面でまとめて監視・操作・管理できるようにする道具","ex":"統合運用管理ツールは多数のサーバーを一括管理する司令塔。ジョブ管理・統合監視・資産管理が主な機能。","why":"スキルシートに統合運用管理ツール名があれば、多数サーバーの運用を担えた人だと読める。"},{"id":"P4-018","part":"Part 4 — インフラエンジニア","ch":"第16章","type":"choice","q":"統合運用管理ツールの「ジョブ管理（ジョブスケジューラ）」とは、どんな機能か。","opts":["決まった作業を、決まった順番・時刻で自動的に実行してくれる機能","集まってきたアクセスを、複数の機械へ振り分けて負担を散らす機能","人が覚えやすい名前を、機械が使う住所のような番号へ変換する機能","大事なデータを二重に保存しておき、片方が壊れても困らないよう備える機能","あやしい通信を入口で止めて、許可された通信だけを通すようにする機能"],"ans":"決まった作業を、決まった順番・時刻で自動的に実行してくれる機能","ex":"ジョブ管理は処理のまとまり（ジョブ）を決まった順序・時刻で自動実行する機能。夜間の一括処理などに使う。","why":"ジョブ設計・運用の経験があれば、定型処理の自動化を担えた人だと読める。"},{"id":"P4-019","part":"Part 4 — インフラエンジニア","ch":"第16章","type":"choice","q":"統合運用管理ツール「JP1」を提供しているメーカーはどこか。","opts":["日立","富士通","NEC","Microsoft","Amazon"],"ans":"日立","ex":"JP1は日立の統合運用管理ソフト。富士通＝Systemwalker、NEC＝WebSAM/MasterScopeと提供元が分かれる。","why":"ベンダーと製品が結びつくと、応募者がどのメーカー圏の現場にいたかを読める。"},{"id":"P4-020","part":"Part 4 — インフラエンジニア","ch":"第16章","type":"choice","q":"統合運用管理ツール「WebSAM（MasterScope）」を提供しているメーカーはどこか。","opts":["NEC","日立","富士通","IBM","Microsoft"],"ans":"NEC","ex":"WebSAM/MasterScopeはNECの統合運用管理製品。日立＝JP1、富士通＝Systemwalker。","why":"製品名からメーカー系統が分かると、応募者の現場を読み取れる。"},{"id":"P4-021","part":"Part 4 — インフラエンジニア","ch":"第18章","type":"choice","q":"ネットワーク機器「ルーター」が担う役割はどれか。","opts":["異なるネットワーク同士をつなぎ、データを最も良い経路へと送り出す道案内をする","同じネットワークの中にある機器同士をつなぎ、データをやり取りさせる結節点になる","あやしい通信を入口で止めて、許可された安全な通信だけを通す見張り役を担う","集まってきたアクセスを、複数の機械へ振り分けて負担を散らす役割を担う","写真や顧客情報などの大事なデータを、読めない形に変えて保存しておく役割を担う"],"ans":"異なるネットワーク同士をつなぎ、データを最も良い経路へと送り出す道案内をする","ex":"ルーターは違うネットワークをつなぐ道案内。同じネットワーク内をつなぐのはスイッチ。","why":"スキルシートの機器名から、どの通信機器を扱った人かを読み取れる。"},{"id":"P4-022","part":"Part 4 — インフラエンジニア","ch":"第18章","type":"choice","q":"ネットワーク機器「スイッチ」が担う役割はどれか。","opts":["同じネットワークの中にある機器同士をつなぎ、データをやり取りさせる結節点になる","異なるネットワーク同士をつなぎ、データを最も良い経路へと送り出す道案内をする","あやしい通信を入口で止めて、許可された安全な通信だけを通す見張り役を担う","集まってきたアクセスを、複数の機械へ振り分けて負担を散らす役割を担う","人が覚えやすい名前を、機械が使う住所のような番号へ変換する役割を担う"],"ans":"同じネットワークの中にある機器同士をつなぎ、データをやり取りさせる結節点になる","ex":"スイッチは同じネットワーク内の機器同士をつなぐ結節点。違うネットワーク同士をつなぐのはルーター。","why":"スキルシートに『スイッチ』とあれば、ネットワーク内の結節点を扱った人だと読める。"},{"id":"P4-023","part":"Part 4 — インフラエンジニア","ch":"第18章","type":"choice","q":"ネットワーク機器「ファイアウォール（FW）」が担う役割はどれか。","opts":["あやしい通信を入口で遮断し、許可された安全な通信だけを通す見張り役を担う","集まってきたアクセスを、複数の機械へ振り分けて負担を散らす役割を担う","異なるネットワーク同士をつなぎ、データを最も良い経路へと送り出す道案内をする","写真や顧客情報などのデータを保管し、求めに応じて取り出して返す役割を担う","人が覚えやすい名前を、機械が使う住所のような番号へ変換する役割を担う"],"ans":"あやしい通信を入口で遮断し、許可された安全な通信だけを通す見張り役を担う","ex":"ファイアウォールは不正な通信を止めるセキュリティの砦。負担を散らすのはロードバランサーの役割。","why":"スキルシートに『FW』とあれば、入口のセキュリティ機器を扱った人だと読める。"},{"id":"P4-024","part":"Part 4 — インフラエンジニア","ch":"第18章","type":"choice","q":"ネットワーク機器「ロードバランサー（LB）」が担う役割はどれか。","opts":["たくさんのアクセスを複数のサーバーへ振り分けて、一台への負担を散らす役割を担う","あやしい通信を入口で止めて、許可された安全な通信だけを通す見張り役を担う","異なるネットワーク同士をつなぎ、データを最も良い経路へと送り出す道案内をする","写真や顧客情報などの大事なデータを、読めない形に変えて保存しておく役割を担う","社内の社員アカウントや使うPCを、まとめて一元的に管理する役割を担う"],"ans":"たくさんのアクセスを複数のサーバーへ振り分けて、一台への負担を散らす役割を担う","ex":"ロードバランサーはアクセスを複数サーバーへ振り分けて負担を散らす。通信を止めるのはファイアウォール。","why":"スキルシートに『LB』とあれば、負担を散らす役割を扱った人だと読める。"},{"id":"P4-025","part":"Part 4 — インフラエンジニア","ch":"第22章","type":"choice","q":"クラウドの「IaaS」とは、どこまでを借りる形か。","opts":["サーバーやネットワークといった土台だけを借り、OSやアプリは自分で用意する","OSやアプリの動作環境まで一式用意された状態を、そのまま借りて使う形である","事業者が完成させて提供するソフトを、自分で何も用意せずそのまま使う形である","通信機器だけを物理的に買い取り、自分たちの施設に置いて運用する形である","機械を置くためのデータセンターの建物だけを、まるごと買い取って使う形である"],"ans":"サーバーやネットワークといった土台だけを借り、OSやアプリは自分で用意する","ex":"IaaSは土台だけ借り自由度が高い。実行環境まで借りるのがPaaS、完成ソフトを使うのがSaaS。","why":"IaaS/PaaS/SaaSの区別が分かると、応募者がどの範囲を扱ったか深掘りできる。"},{"id":"P4-026","part":"Part 4 — インフラエンジニア","ch":"第22章","type":"choice","q":"主要クラウド事業者「AWS」を提供している会社と特徴の組み合わせとして正しいものはどれか。","opts":["Amazonが提供し、最も早くから普及し、サービスの種類が最も幅広いクラウドである","Microsoftが提供し、Windowsや社内の業務ソフトとの連携を得意とするクラウドである","Googleが提供し、データ分析やAI、コンテナ基盤を主な強みとするクラウドである","OracleやIBMが提供する、大手企業の基幹システムの移行を主目的としたクラウドである","国内の通信事業者が提供する、官公庁の中だけで使われる専用のクラウドである"],"ans":"Amazonが提供し、最も早くから普及し、サービスの種類が最も幅広いクラウドである","ex":"AWSはAmazonが提供する最大手クラウドで、サービスの種類が幅広い。SESのインフラ案件でもよく登場する。","why":"スキルシートに『AWS』とあれば、案件数の多い主力クラウドを扱った人だと読める。"},{"id":"P4-027","part":"Part 4 — インフラエンジニア","ch":"第22章","type":"choice","q":"主要クラウド事業者「Microsoft Azure」を提供している会社と特徴の組み合わせとして正しいものはどれか。","opts":["Microsoftが提供し、WindowsやADなど同社の社内システム製品との連携を得意とするクラウドである","Amazonが提供し、最も早くから普及してサービスの種類が幅広いクラウドである","Googleが提供し、データ分析やAI、コンテナ基盤を主な強みとするクラウドである","OracleやIBMが提供する、大手企業の基幹システムの移行を主目的としたクラウドである","国内の通信事業者が提供する、官公庁の中だけで使われる専用のクラウドである"],"ans":"Microsoftが提供し、WindowsやADなど同社の社内システム製品との連携を得意とするクラウドである","ex":"AzureはMicrosoftが提供し、Windows ServerやADなど同社製品との連携に強い。社内システム系のクラウド案件で見かける。","why":"スキルシートに『Azure』とあれば、Microsoft系の社内システムに近い経験が読める。"},{"id":"P4-028","part":"Part 4 — インフラエンジニア","ch":"第22章","type":"choice","q":"クラウドの「責任共有モデル」の考え方として正しいものはどれか。","opts":["事業者が土台や設備の安全を、利用者が自分のデータや設定の安全を分担して守る","クラウドを使えばすべての安全は事業者がまとめて保証してくれる、という考え方である","利用者が、土台や設備からデータまで、すべての安全を一人で背負うという考え方である","通信機器を作っているメーカーが、システム全体の安全をまとめて負うという考え方である","誰も特に安全の責任を負わなくても、クラウドなら自動で安全が保たれるという考え方である"],"ans":"事業者が土台や設備の安全を、利用者が自分のデータや設定の安全を分担して守る","ex":"責任共有モデルでは事業者が設備、利用者が自分のデータや設定を担う。『クラウドなら全部安全』ではない。","why":"責任分担を意識できているかは、クラウド運用の成熟度を測る材料になる。"},{"id":"P4-029","part":"Part 4 — インフラエンジニア","ch":"第23章","type":"choice","q":"AWSの「EC2」とは、おおまかに何のサービスか。","opts":["クラウド上で借りて使う仮想のサーバーで、アプリを動かす土台になる","写真や顧客情報などのファイルやデータを、大量に保管しておくためのサービス","データベースを、面倒な管理ごと事業者にまかせた形で動かしてくれるサービス","クラウドの中に、自分たちだけが使える専用のネットワーク区画を作るサービス","誰がどの操作をしてよいか、利用者ごとの権限をまとめて管理するためのサービス"],"ans":"クラウド上で借りて使う仮想のサーバーで、アプリを動かす土台になる","ex":"EC2はクラウド上の仮想サーバー。S3＝保管、RDS＝DB、VPC＝専用区画、IAM＝権限と役割が分かれる。","why":"スキルシートに『EC2』とあれば、クラウド上でサーバーを扱った人だと読める。"},{"id":"P4-030","part":"Part 4 — インフラエンジニア","ch":"第23章","type":"choice","q":"AWSの「RDS」とは、何のサービスか。","opts":["データベースを、面倒な管理ごと事業者にまかせた形で使えるサービス","写真や顧客情報などのファイルやデータを、大量に保管しておくためのサービス","クラウド上で借りて使う仮想のサーバーで、アプリを動かす土台になるサービス","クラウドの中に、自分たちだけが使える専用のネットワーク区画を作るサービス","誰がどの操作をしてよいか、利用者ごとの権限をまとめて管理するためのサービス"],"ans":"データベースを、面倒な管理ごと事業者にまかせた形で使えるサービス","ex":"RDSはDBを管理込みで使えるサービス。ファイル保管はS3、仮想サーバーはEC2。","why":"スキルシートに『RDS』とあれば、クラウドでDBを扱った人だと読める。"},{"id":"P4-031","part":"Part 4 — インフラエンジニア","ch":"第23章","type":"choice","q":"AWSの「VPC」とは、何のサービスか。","opts":["クラウドの中に、自分たちだけが使える専用のネットワーク区画を作るサービス","クラウド上で借りて使う仮想のサーバーで、アプリを動かす土台になるサービス","写真や顧客情報などのファイルやデータを、大量に保管しておくためのサービス","誰がどの操作をしてよいか、利用者ごとの権限をまとめて管理するためのサービス","アプリのプログラムを、自前のサーバーを用意せずに実行できるようにするサービス"],"ans":"クラウドの中に、自分たちだけが使える専用のネットワーク区画を作るサービス","ex":"VPCは自分専用のネットワーク区画。仮想サーバーはEC2、権限管理はIAM。","why":"スキルシートに『VPC』とあれば、クラウド上でネットワーク区画を扱った人だと読める。"},{"id":"P4-032","part":"Part 4 — インフラエンジニア","ch":"第23章","type":"choice","q":"AWSの「IAM」とは、何のサービスか。","opts":["誰が何をしてよいか、利用者ごとの権限をまとめて管理するためのサービス","クラウド上で借りて使う仮想のサーバーで、アプリを動かす土台になるサービス","写真や顧客情報などのファイルやデータを、大量に保管しておくためのサービス","クラウドの中に、自分たちだけが使える専用のネットワーク区画を作るサービス","システムが正常に動いているか、状態や記録を見張って集めておくサービス"],"ans":"誰が何をしてよいか、利用者ごとの権限をまとめて管理するためのサービス","ex":"IAMは利用者と権限の管理を行う。仮想サーバーはEC2、ネットワーク区画はVPC、見張りはCloudWatch。","why":"スキルシートに『IAM』とあれば、クラウドの権限設計に関わった人だと読める。"},{"id":"P4-033","part":"Part 4 — インフラエンジニア","ch":"第24章","type":"choice","q":"AWSとAzureのサービスの対応として正しいものはどれか。","opts":["仮想サーバーは AWS＝EC2／Azure＝Virtual Machines","仮想サーバーは AWS＝S3／Azure＝Blob Storage","仮想サーバーは AWS＝RDS／Azure＝Azure SQL Database","仮想サーバーは AWS＝VPC／Azure＝Virtual Network","仮想サーバーは AWS＝IAM／Azure＝Microsoft Entra ID"],"ans":"仮想サーバーは AWS＝EC2／Azure＝Virtual Machines","ex":"仮想サーバーはEC2↔Virtual Machines。S3↔Blob Storageは保管、VPC↔VNetはネットワークの対応。","why":"AWSとAzureの対応が分かると、片方の経験者の話をもう片方に置き換えて理解できる。"},{"id":"P4-034","part":"Part 4 — インフラエンジニア","ch":"第12章","type":"choice","q":"インフラの工程「要件定義」で主に行うことはどれか。","opts":["利用者数・処理量・必要な性能・予算・止まりにくさなどを発注者と固める","完成した設計書のとおりに、実際にシステムの環境を作り上げていく作業を行う","システムが稼働し始めた後、毎日問題なく動き続けるよう世話をする作業を行う","システムに異常が起きていないか、状態を常に見張り続ける作業を行う","壊れてしまった機器を交換したり、修理したりして元の状態に戻す作業を行う"],"ans":"利用者数・処理量・必要な性能・予算・止まりにくさなどを発注者と固める","ex":"要件定義は何が必要かを固める最上流の工程。実際に作るのは構築、見張るのは監視。","why":"スキルシートで要件定義の経験があれば、上流工程を担えた人だと読める。"},{"id":"P4-035","part":"Part 4 — インフラエンジニア","ch":"第12章","type":"choice","q":"インフラの工程「構築」で主に行うことはどれか。","opts":["設計書のとおりにOSやソフトを入れ、機器同士をつなぎ、正しく動くか確かめる","利用者数や必要な性能、予算などを発注者と話し合って固める作業を行う","システムが稼働し始めた後の、利用者からの問い合わせ対応などの作業を行う","システムに異常が起きていないか、状態を常に見張り続ける作業を行う","どれだけ止まらず動かすかという稼働の基準を、発注者と取り決める作業を行う"],"ans":"設計書のとおりにOSやソフトを入れ、機器同士をつなぎ、正しく動くか確かめる","ex":"構築は設計書どおりに実際の環境を作る工程。SESの若手〜中堅が多く担当する。","why":"スキルシートで構築の経験があれば、手を動かして環境を作れた人だと読める。"},{"id":"P4-036","part":"Part 4 — インフラエンジニア","ch":"第12章","type":"choice","q":"インフラの工程「運用」と「保守」の違いとして正しいものはどれか。","opts":["運用は日々の定型作業など日常の世話、保守は不具合修正や機器交換などで正常な状態に戻す","運用は設計書を書くこと、保守は発注者と必要な性能や予算を固めることである","運用は機器を買い入れること、保守は機器を売りさばくことを指している","運用は見張るためのツールを作ること、保守は通信機器を製造することである","運用はクラウドを契約すること、保守はオンプレを契約することを指している"],"ans":"運用は日々の定型作業など日常の世話、保守は不具合修正や機器交換などで正常な状態に戻す","ex":"運用は日常の世話、保守は正常な状態への維持・回復。重なる部分も多く『運用保守』とまとめて呼ばれる。","why":"運用と保守のどちらを担ったかで、定型中心か障害対応まで担えるかを見分けられる。"},{"id":"P4-037","part":"Part 4 — インフラエンジニア","ch":"第25章","type":"choice","q":"監視の3種類のうち「死活監視」とは何を確認するものか。","opts":["サーバーがちゃんと応答するか（生きて動いているか）を確認する","機械の処理能力や記憶域の空きが、足りているかどうかを確認する","動作の記録に、エラーや異常を知らせるメッセージが出ていないかを確認する","集まってきたアクセスが、複数の機械へきちんと振り分けられているかを確認する","人が覚えやすい名前を、機械が使う番号へ正しく変換できているかを確認する"],"ans":"サーバーがちゃんと応答するか（生きて動いているか）を確認する","ex":"死活監視は応答の有無を確認する安否確認。空き容量はリソース監視、記録の確認はログ監視。","why":"どの監視を担当したかで、運用での見ていた範囲を具体的に把握できる。"},{"id":"P4-038","part":"Part 4 — インフラエンジニア","ch":"第25章","type":"choice","q":"サーバーやネットワークの状態を見張る『監視ツール』の代表的な組み合わせはどれか。","opts":["Zabbix・Nagios","JP1・Systemwalker","Apache・nginx","Terraform・Ansible","EC2・S3"],"ans":"Zabbix・Nagios","ex":"Zabbix・Nagiosは代表的な監視ツール。JP1・Systemwalkerは国産ベンダー（日立・富士通）の統合運用管理、Apache・nginxはWebサーバーソフト、Terraform・Ansibleは構成管理。","why":"スキルシートに監視ツール名があれば、監視を実際に運用した人だと読める。"},{"id":"P4-039","part":"Part 4 — インフラエンジニア","ch":"第25章","type":"choice","q":"システムを「止めない」ための工夫である「冗長化」とは何か。","opts":["機器を二重・三重に用意し、片方が壊れてももう片方で動き続けられるようにすること","写真や顧客情報などの大事なデータを、読めない形に変えて守るようにすること","集まってきたアクセスを、複数の機械へ振り分けて負担を散らすようにすること","人が覚えやすい名前を、機械が使う住所のような番号へ変換するようにすること","事業者が完成させて提供するソフトを、自分で用意せずそのまま使うようにすること"],"ans":"機器を二重・三重に用意し、片方が壊れてももう片方で動き続けられるようにすること","ex":"冗長化は予備を持たせて止まらなくする設計。これで実現する止まりにくさが可用性。","why":"冗長化の経験があれば、止めない設計に関わった人だと読める。"},{"id":"P4-040","part":"Part 4 — インフラエンジニア","ch":"第21章","type":"choice","q":"「仮想化」とは、おおまかに何のための技術か。","opts":["1台の物理的なコンピュータの中に複数台のサーバーを同居させ、機械を無駄なく使う技術","人が覚えやすい名前を、機械が使う住所のような番号へ変換するための技術である","写真や顧客情報などの大事なデータを、読めない形に変えて保存するための技術である","集まってきたアクセスを、複数の機械へ振り分けて負担を散らすための技術である","事業者が完成させて提供するソフトを、自分で用意せずそのまま使う利用の形態である"],"ans":"1台の物理的なコンピュータの中に複数台のサーバーを同居させ、機械を無駄なく使う技術","ex":"仮想化は1台を何台分にも使う工夫。生まれた分身のサ
