ーバーを仮想マシン（VM）と呼ぶ。","why":"仮想化の経験があれば、サーバーを効率的に集約する基盤を扱った人だと読める。"},{"id":"P4-041","part":"Part 4 — インフラエンジニア","ch":"第21章","type":"choice","q":"「コンテナ（Docker）」が仮想マシン（VM）と比べて軽量・高速な主な理由はどれか。","opts":["OSを丸ごと用意せず、土台のOSを共有してアプリに必要な部分だけを箱詰めするため","通信機器を一切使わず、機械だけで完結して動くようにできているため","写真や顧客情報などの大事なデータを、読めない形に変える処理を省いているため","自前の機械では動かせず、クラウドの上でしか動かせない仕組みになっているため","誰が何をしてよいかという権限の管理を、まるごと省略してしまっているため"],"ans":"OSを丸ごと用意せず、土台のOSを共有してアプリに必要な部分だけを箱詰めするため","ex":"VMはOSごと分身を作るため重く、コンテナはOSを共有して必要部分だけ箱詰めするため軽い。代表ソフトがDocker。","why":"コンテナの経験があれば、軽量な実行基盤を扱った人だと読める。"},{"id":"P4-042","part":"Part 4 — インフラエンジニア","ch":"第21章","type":"choice","q":"「Kubernetes（K8s）」の役割として正しいものはどれか。","opts":["たくさんのコンテナを自動で配置し、混雑に応じて増減し、壊れたら立て直す司令塔","1台のコンピュータの中に、複数の仮想マシンを作り出すための土台となるソフト","人が覚えやすい名前を、機械が使う住所のような番号へ変換するための仕組みである","写真や顧客情報などのファイルやデータを、保管しておくための保存の仕組みである","あやしい通信を入口で遮断し、許可された安全な通信だけを通すための見張り役である"],"ans":"たくさんのコンテナを自動で配置し、混雑に応じて増減し、壊れたら立て直す司令塔","ex":"Kubernetesは大量のコンテナを自動管理する司令塔。コンテナを作り動かす定番ソフトはDocker。","why":"Kubernetesの経験があれば、大規模なコンテナ基盤を扱える希少な人材だと読める。"},{"id":"P4-043","part":"Part 4 — インフラエンジニア","ch":"第12章","type":"choice","q":"構成管理・自動化に使われるツール「Ansible」「Terraform」は、何のためのツールか。","opts":["手作業の代わりに、コードを書いてインフラの構築を自動で行うためのツール","人が覚えやすい名前を、機械が使う住所のような番号へ変換するためのツールである","会社の内外にやり取りされるメールを、送ったり受け取ったりするためのツールである","写真や顧客情報などの大事なデータを、読めない形に変えて守るためのツールである","集まってきたアクセスを、複数の機械へ振り分けて負担を散らすための機器である"],"ans":"手作業の代わりに、コードを書いてインフラの構築を自動で行うためのツール","ex":"AnsibleやTerraformは構築をコードで自動化するツール。手作業の構築を効率化する。","why":"これらの経験があれば、構築の自動化まで踏み込んだ人だと読める。"},{"id":"P5-001","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"スキルシートを読むときの基本姿勢として、正しいものはどれか。","opts":["技術名そのものに目を奪われすぎず、どの工程をどんな役割でどれくらいの期間担当したかを見る","記載された技術名の数を一つずつ数え、その数が多いほど一律に高く評価する","最新の技術名が上のほうに並んでいるかどうかだけで、応募者の実力を判断する","関わった会社名の知名度の高さだけを根拠に、経験全体の質を推し量る","資格欄に並んだ資格の数の多さだけを見て、応募者の力を総合的に判断する"],"ans":"技術名そのものに目を奪われすぎず、どの工程をどんな役割でどれくらいの期間担当したかを見る","ex":"同じ技術でも工程・役割・期間で経験の意味は大きく変わるため、中身を見る必要がある。","why":"技術名の額面ではなく経験の質を読み取るのが目的。"},{"id":"P5-002","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"スキルシートで、その人がどの段階の経験を積んできたかが最もよく分かる欄はどれか。","opts":["担当工程の欄（要件定義〜運用のどこを担ったか）","業種の欄（金融・製造などどの業界か）","勤務地の欄（どの拠点で働いていたか）","使用言語の欄（どの言語を使ったか）","資格の欄（どの資格を取得したか）"],"ans":"担当工程の欄（要件定義〜運用のどこを担ったか）","ex":"要件定義・設計が多ければ上流寄り、製造・テストなら下流寄りと、経験フェーズが読み取れる。","why":"工程欄から上流/下流の経験を判断するのが読み方の核心。"},{"id":"P5-003","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"担当工程が「要件定義・設計」中心の応募者について、読み取れることとして正しいものはどれか。","opts":["要件定義や設計を多く担い、上流寄りの経験を積んでいると考えられる","稼働後の運用・保守だけを担当し、開発には関わっていないと考えられる","コードを書く実装の経験は、これまで一切ないと断定できる","プロジェクトをまとめるリーダーの経験が、必ずあると確定できる","担当工程が上流であることは、技術力が低いことを示している"],"ans":"要件定義や設計を多く担い、上流寄りの経験を積んでいると考えられる","ex":"要件定義・設計が多い人は上流寄り、製造・テスト中心なら下流寄りと見立てられる。","why":"工程欄から経験の位置づけを読む練習。"},{"id":"P5-004","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"担当工程が「運用・保守」中心の応募者について、読み取れることとして正しいものはどれか。","opts":["システムが動き出した後の、維持・対応フェーズの経験者である","システムを一から設計・構築した経験が、特に豊富である","要件定義を主導してきた、上流工程中心の人材である","プロジェクト全体を管理する立場を、必ず務めてきた","開発に関わる経験が、これまで全く無いと断定できる"],"ans":"システムが動き出した後の、維持・対応フェーズの経験者である","ex":"運用・保守が中心なら、稼働後の維持・対応のフェーズを担ってきた人とわかる。","why":"工程欄から下流・運用フェーズの経験を読み取る。"},{"id":"P5-005","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"スキルシートに「リーダー・PL・PM」といった記載がある場合、読み取れることとして正しいものはどれか。","opts":["人やプロジェクトをまとめる側に立った、管理・調整の経験を示している","現場で手を動かすだけで、技術力が低いことを示している","稼働後の運用・監視だけを担当してきたことを示している","業務に関係なく、資格を多く保有していることを示している","本人の希望する給与水準が高いことを、間接的に示している"],"ans":"人やプロジェクトをまとめる側に立った、管理・調整の経験を示している","ex":"リーダー・PL・PMの記載は、メンバーをまとめる立場での経験を表す。","why":"役割欄からマネジメント側の経験を読み取る。"},{"id":"P5-006","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"スキルシートの「使用技術欄」を読むときの注意点として、正しいものはどれか。","opts":["「実務で使った」のか「学習・研修レベル」なのかが、記載からは曖昧なことがある","記載された技術は必ず実務経験を意味するので、深掘りの確認は不要である","技術名の数が多いほど、その応募者は必ず実力が高いと判断できる","技術欄は応募者の業種を表すだけで、技術の中身とは関係がない","技術欄は保有資格の有無を示すもので、実際の技術力とは無関係である"],"ans":"「実務で使った」のか「学習・研修レベル」なのかが、記載からは曖昧なことがある","ex":"技術名が書いてあっても実務か学習レベルかで価値が違うため、そこを確かめる必要がある。","why":"スキルシートを額面で受け取らないための前提知識。"},{"id":"P5-007","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"スキルシートで案件の「期間」を読むときの正しい考え方はどれか。","opts":["期間が長くても、同じ作業の繰り返しか幅広い経験かで、身についた実力は変わる","案件の期間が長ければ長いほど、無条件でその応募者は実力が高いと判断できる","期間の短い案件は、どれも経験として価値が無いものとして扱ってよい","担当した期間の長さは、使用した技術の数と必ず比例して増えていく","担当した期間の長さは、その案件で就いた役割の高さを直接示している"],"ans":"期間が長くても、同じ作業の繰り返しか幅広い経験かで、身についた実力は変わる","ex":"長期間でも同じ作業の反復なら経験の幅は狭く、期間の長さ＝実力ではない。","why":"期間の長さを実力と取り違えないための知識。"},{"id":"P5-008","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"スキルシートに不自然な「空白期間」がある場合の正しい対応はどれか。","opts":["頭から否定せず、どんな事情があったのかを丁寧に確認する","空白期間がある時点で、内容を問わず不採用と決めてよい","空白には触れず、何も尋ねずに無視するのが礼儀である","空白の長さに応じて、自動的に評価点を差し引いていく","空白の分は資格欄の資格数で、必ず埋め合わせできると考える"],"ans":"頭から否定せず、どんな事情があったのかを丁寧に確認する","ex":"空白期間は事情がさまざまなので、決めつけず理由を丁寧に聞くのが基本。","why":"チェックリストにある空白期間の扱い方を理解する。"},{"id":"P5-009","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"応募者の経験の実態を一つ深掘りして確かめるのに適した聞き方はどれか。","opts":["一番深く関わった案件はどれですか、と一つに絞って具体的に聞く","知っている技術名を全部挙げてください、と数を網羅的に聞く","この用語の定義を言ってください、とクイズのように聞く","この技術はできますか、とYes/Noで答えられる形で聞く","資格は何個持っていますか、と保有数だけを単純に聞く"],"ans":"一番深く関わった案件はどれですか、と一つに絞って具体的に聞く","ex":"一点を深掘りすると、繰り返しか幅広い経験かといった実態が見えてくる。","why":"狭く深く聞いて実態を確かめる読み方の延長。"},{"id":"P5-010","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"開発系で「実務経験者かどうかの最初の目安」とされる組み合わせはどれか。","opts":["言語＋フレームワーク＋データベース＋Gitが、一通り揃っているか","何らかのプログラミング言語を、一つでも名乗っているかどうか","IT系の資格を、一つ以上取得して保有しているかどうか","クラウドの認定資格を、取得して保有しているかどうか","HTML/CSSを使って、Webページの見た目を書けるかどうか"],"ans":"言語＋フレームワーク＋データベース＋Gitが、一通り揃っているか","ex":"開発系は言語単体ではなく、FW・DB・Gitまで揃っているかが実務経験者の最初の目安。","why":"開発職の必須スキルの目安を知っておく。"},{"id":"P5-011","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"Webバックエンドの応募者で「言語だけがあり、フレームワークやDBが無い」場合の見方として正しいものはどれか。","opts":["学習〜浅めの段階の可能性があり、選べる案件は限られると見る","上流工程まで一人でこなせる、即戦力の経験者だと見てよい","クラウドの設計・構築を任せられる、専門家だと見てよい","画面側を専門に扱う、フロントエンドの専門家だと判断できる","実務経験の有無にかかわらず、資格保有者と同等に評価できる"],"ans":"学習〜浅めの段階の可能性があり、選べる案件は限られると見る","ex":"FW・DBが欠けると実務経験が浅い可能性があり、案件・単価が限られやすい。","why":"必須が欠けたときの市場価値の見立てを理解する。"},{"id":"P5-012","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"フロントエンドの必須スキルとして、正しい組み合わせはどれか。","opts":["JavaScript／TypeScript、ReactかVue、HTML/CSS、Git","COBOL、メインフレーム（汎用機）、JCLでのバッチ・ジョブ制御の理解","Oracle/SQL Server、SQL、テーブル設計、社内向けの業務知識","監視ツールの操作、障害の一次対応、手順書に沿った運用作業、夜間当番","TCP/IP、ルーター・スイッチの設定、ファイアウォール、ネットワーク設計"],"ans":"JavaScript／TypeScript、ReactかVue、HTML/CSS、Git","ex":"フロントは言語に加えReactかVue、HTML/CSS、Gitが必須の目安とされる。","why":"職種別の必須スキルを把握する。"},{"id":"P5-013","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"フロントエンドで「素のJavaScriptやHTML/CSSのみ、jQuery中心」の応募者の見方として正しいものはどれか。","opts":["モダン開発の経験が不足とみなされやすく、選べる案件や単価が限られる","最新のフレームワークを使いこなす、上級の開発者だと見てよい","サーバーやネットワークのインフラ設計の、専門家だと判断できる","業務系システムの上流を担う、上流SEとして高く評価できる","この記載から、必ず資格を多数持っていると推測できる"],"ans":"モダン開発の経験が不足とみなされやすく、選べる案件や単価が限られる","ex":"ReactやVueなどのモダンな経験が見えないと、経験不足とみなされやすい。","why":"フロントの不足時の見方を理解する。"},{"id":"P5-014","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"インフラ系の応募者で市場価値が大きく変わる軸として、正しいものはどれか。","opts":["「作る側（設計・構築）」か「動かす側（運用・監視）」か","出身地が都市部か、それとも地方かという地域の違い","保有資格が国家資格か、それとも民間資格かの違い","勤務形態が客先常駐か、それとも在宅勤務かの違い","主に使うOSがWindowsか、それともLinuxかの違い"],"ans":"「作る側（設計・構築）」か「動かす側（運用・監視）」か","ex":"インフラは設計・構築まで広げられているほど価値が高く、運用・監視中心は単価が上がりにくい。","why":"インフラ職の価値判断の軸を理解する。"},{"id":"P5-015","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"クラウド職で「画面から少し触った」程度の応募者の見方として正しいものはどれか。","opts":["実務としては浅いと見る（自分で設計まで一人でできると高需要）","設計から構築まで一人でこなせる、高需要の人材だと見てよい","稼働後の運用・監視には、一切関われない人材だと断定できる","ネットワークの設計・構築を任せられる、専門家だと判断できる","業務系システムの上流を担う、上流SEと同等に評価できる"],"ans":"実務としては浅いと見る（自分で設計まで一人でできると高需要）","ex":"少し触った程度は実務として浅く、自分で設計・構築までできると高需要になる。","why":"クラウド経験の深さの見立てを理解する。"},{"id":"P5-016","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"経験レベルの目安で「中級（3〜5年）」の開発系が指す内容として、正しいものはどれか。","opts":["設計を理解し、自分で実装を組み立てられる（DB設計も含む）","指示された範囲の実装やテストを、言われた通りにこなせる","要件定義や基本設計を担い、チームの技術リードができる","手順書に沿った運用・監視と、障害の一次対応ができる","開発の現場に入ったばかりで、実装の経験がまだ全く無い"],"ans":"設計を理解し、自分で実装を組み立てられる（DB設計も含む）","ex":"中級は設計を理解して自力で実装を組み立てられる段階で、DB設計も含む。","why":"熟練度の目安（初級・中級・上級）が何を指すかを知る。"},{"id":"P5-017","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"経験レベルの目安で「初級（〜2年）」のインフラ系が指す内容として、正しいものはどれか。","opts":["手順書に沿った運用・監視を行い、障害の一次対応ができる","非機能要件を含む設計や、クラウド全体の設計までできる","設計書をもとに自分で構築でき、障害の切り分けもできる","後輩の指導を担い、チームの技術リードまでこなせる","顧客とやり取りして、要件定義そのものを主導できる"],"ans":"手順書に沿った運用・監視を行い、障害の一次対応ができる","ex":"初級は手順書に沿った運用・監視や一次対応ができる入口の段階を指す。","why":"初級レベルの目安を理解する。"},{"id":"P5-018","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"情シス出身者を“エンジニア”として見るときの注意点として、正しいものはどれか。","opts":["深い実装・構築の専門性は持たないことが多く、自分で手を動かしたかを確認する","深い実装の専門性が必ず備わっているので、技術面の確認は不要である","業種を問わず、必ず上流SEとして即戦力になると断定してよい","技術力だけを物差しにして測るのが、最も正確な評価方法である","保有資格の欄に並んだ資格だけを見て、実力を判断してよい"],"ans":"深い実装・構築の専門性は持たないことが多く、自分で手を動かしたかを確認する","ex":"情シスは広く浅い基礎＋調整力が軸なので、技術は手を動かしたか外部任せかを確認する。","why":"情シス出身者の見方の前提を理解する。"},{"id":"P5-019","part":"Part 5 — 面接の実践","ch":"第27章","type":"choice","q":"スキルシートの資格欄をどう扱うのが正しいか。","opts":["実力そのものではないが、基礎知識の裏づけや学習意欲の証として参考にする","保有する資格の数が、そのまま応募者の実力の順位を表すと考える","資格さえ持っていれば、実務経験の有無を確認する必要はないと考える","資格は実力と無関係なので、評価では一切見ずに無視してよいと考える","資格欄は給与交渉の材料を示すためだけにある情報だと考える"],"ans":"実力そのものではないが、基礎知識の裏づけや学習意欲の証として参考にする","ex":"資格は実力そのものではなく、基礎知識の裏づけや学習意欲の証として市場価値に影響する。","why":"資格欄の位置づけを正しく理解する。"},{"id":"P5-020","part":"Part 5 — 面接の実践","ch":"第29章","type":"choice","q":"応募者の経験の深さを測るときの基本的な考え方として、正しいものはどれか。","opts":["「広く浅く」より「狭く深く」、一つの案件を掘り下げて聞くほうが正確に測れる","専門用語の意味を正解・不正解で判定するほうが、実力を正確に測れる","知っている技術名をできるだけ多く挙げさせるのが、最も有効である","保有する資格の数を数えて、その多さで実力を判定するのが確実である","関わった会社名の知名度の高さから、経験の深さを判断するのがよい"],"ans":"「広く浅く」より「狭く深く」、一つの案件を掘り下げて聞くほうが正確に測れる","ex":"一番自信のある案件を一つ選んで深掘りするほうが、実力が正確に分かる。","why":"良い質問の基本方針を知識として理解する。"},{"id":"P5-021","part":"Part 5 — 面接の実践","ch":"第29章","type":"choice","q":"次のうち、避けたい「地雷質問」にあたるものはどれか。","opts":["「○○って知ってますか？」という、Yes/Noで終わってしまう質問","担当したシステムを、詳しくない人にも分かるよう説明してもらう質問","一番深く関わった案件と、そこで担った役割を具体的に尋ねる質問","印象に残っている障害と、それにどう対応したかを尋ねる質問","自分で判断し工夫した点はどこか、を具体的に尋ねる質問"],"ans":"「○○って知ってますか？」という、Yes/Noで終わってしまう質問","ex":"Yes/No質問は知ったかぶりを誘発し実力が測れないため避けたい。","why":"地雷質問の典型を見分けられるようにする。"},{"id":"P5-022","part":"Part 5 — 面接の実践","ch":"第29章","type":"choice","q":"「専門用語の定義クイズ」を面接で避けるべき理由として、正しいものはどれか。","opts":["緊張で言葉が出てこないだけのことが多く、実力を不正確にしか測れないから","応募者の誰もが必ず正解してしまい、応募者の間で差がつかないから","定義の説明が長くなり、面接時間が想定より長くなりすぎるから","技術に詳しい面接官でないと使えず、出題自体が難しいから","資格欄を見れば分かる内容なので、質問する意味が重複するから"],"ans":"緊張で言葉が出てこないだけのことが多く、実力を不正確にしか測れないから","ex":"定義クイズは緊張で答えられないだけのことが多く、実力を正確に測れない。","why":"地雷質問が逆効果な理由を理解する。"},{"id":"P5-023","part":"Part 5 — 面接の実践","ch":"第29章","type":"choice","q":"地雷質問を有益な質問に言い換える鉄則として、正しいものはどれか。","opts":["「具体的に何を・どうやったか」を語ってもらう、開いた質問に言い換える","できるだけYes/Noで即答できる、閉じた質問に絞り込んでいく","用語の定義を正確に答えさせる、クイズ形式の質問に統一する","できるかできないかを、本人の主観だけで答えさせる形にする","知っている技術名の数を、応募者どうしで競わせる形にする"],"ans":"「具体的に何を・どうやったか」を語ってもらう、開いた質問に言い換える","ex":"閉じた質問ではなく、具体的に何をどうやったかを開いて聞くのが鉄則。","why":"良い質問への言い換え方を理解する。"},{"id":"P5-024","part":"Part 5 — 面接の実践","ch":"第30章","type":"choice","q":"用語集における「エスカレーション」の意味として、正しいものはどれか。","opts":["自分で解決できない事象を、上位の担当者や専門者へ引き継ぐこと","予備の機器を持たせ、一部が壊れてもシステムを止めなくすること","ログインなどで、操作している人が本人かどうかを確かめること","1台の物理機器の中に、複数の仮想サーバーを作って動かすこと","ドメイン名と、それに対応するIPアドレスを相互に変換すること"],"ans":"自分で解決できない事象を、上位の担当者や専門者へ引き継ぐこと","ex":"エスカレーションは、自分で解決できない事象を上位や専門者へ引き継ぐことを指す。","why":"面接で出る運用系の基本用語を押さえる。"},{"id":"P5-025","part":"Part 5 — 面接の実践","ch":"第30章","type":"choice","q":"用語集における「可用性」の意味として、正しいものはどれか。","opts":["システムの“止まりにくさ”を表す、提供品質の度合い","予備を持たせて、壊れても止まらなくする設計そのもの","稼働率の保証など、サービス提供品質を約束した契約","本人確認（認証）と、権限付与（認可）をまとめた概念","データを表の形式で整理して管理する、仕組みのこと"],"ans":"システムの“止まりにくさ”を表す、提供品質の度合い","ex":"可用性はシステムの止まりにくさを表す。冗長化はそれを高める手段の一つ。","why":"冗長化・SLAと混同しやすい用語を区別して理解する。"},{"id":"P5-026","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"スキルシートの「規模（チーム人数）」欄を読むときの考え方として、正しいものはどれか。","opts":["大規模なチームほど分業が進み、一人が担当する範囲は狭くなりやすいと見る","人数が多い案件ほど、その人が幅広い工程を一人でこなしたと判断してよい","規模は予算の大きさを示すだけで、担当範囲の広さとは関係しないと考える","人数が少ない案件は重要度が低いので、経験として評価しなくてよいと見る","規模欄の数字が大きいほど、その人の役職や単価も高いと判断してよい"],"ans":"大規模なチームほど分業が進み、一人が担当する範囲は狭くなりやすいと見る","ex":"第28章。大規模＝分業で担当が狭く、小規模＝一人で広く担うことが多い。人数は担当範囲を読む手がかりで、役職や単価を直接表すものではない。","why":"スキルシートの規模欄から、担当範囲の広さの当たりをつけて深掘りするため。"},{"id":"P5-027","part":"Part 5 — 面接の実践","ch":"第29章","type":"choice","q":"面接で「印象に残っている障害と、その時の対応」を聞くねらいとして、正しいものはどれか。","opts":["現場でしか積めないトラブル対応の経験から、実戦力や責任感を読み取るため","障害に関する専門用語を正しく言えるかどうかで、知識量を採点するため","うまくいった成功体験だけを聞き出して、本人の自信の強さを測るため","過去の失敗を指摘して、追い込まれたときの反応や弱点を試すため","障害対応の経験の有無だけを確認し、無ければその場で不合格にするため"],"ans":"現場でしか積めないトラブル対応の経験から、実戦力や責任感を読み取るため","ex":"第29章③。トラブル対応は現場でしか積めない経験で、困った場面でどう動いたかから実戦力・責任感が見える。とくにインフラ・運用系で大きな判断材料。","why":"スキルシートの担当工程だけでは見えない実戦経験を、面接で確かめるため。"},{"id":"P5-028","part":"Part 5 — 面接の実践","ch":"第29章","type":"choice","q":"「担当したシステムを、ITに詳しくない人に説明するなら？」と聞くことのねらいとして正しいものはどれか。","opts":["本当に理解している人ほど、やさしい言葉で全体像を説明できるかを見るため","専門用語をどれだけ多く正確に並べられるかで、知識量の多さを測るため","説明の速さと声の大きさから、コミュニケーション力を採点するため","用語の定義を正確に暗記できているかを、その場で答えてもらうため","説明が下手な応募者をふるい落とし、話し上手な人だけを残すため"],"ans":"本当に理解している人ほど、やさしい言葉で全体像を説明できるかを見るため","ex":"第29章①。本当に理解している人ほど難しい言葉を使わず分かりやすく説明できる。用語を並べるだけで要点を言えないなら、表面的な関わりだった可能性。","why":"用語の正誤判定ではなく、自分の言葉で語れるかで理解の深さを測るため。"},{"id":"P5-029","part":"Part 5 — 面接の実践","ch":"第29章","type":"choice","q":"一つの案件を深掘りする際、「設計書を書く側でしたか、それをもとに作る側でしたか」と聞くねらいはどれか。","opts":["同じ案件でも、上流（設計）寄りか下流（製造）寄りか、立ち位置を具体的に確かめるため","設計と製造のどちらが技術的に高度かを、応募者本人に格付けさせるため","設計書を書いた枚数を数えてもらい、こなした作業量の多さを比べるため","設計と製造のどちらが好きかという、本人の好みや志向だけを確認するため","設計と製造という用語の違いを正しく言えるかどうかを、その場で試すため"],"ans":"同じ案件でも、上流（設計）寄りか下流（製造）寄りか、立ち位置を具体的に確かめるため","ex":"第29章②。「書く側／作る側」を聞くと、同じ案件内でも上流寄りか下流寄りか、受け身か主体的に関わったかが見えてくる。","why":"スキルシートの工程欄を、案件の中での実際の立ち位置まで踏み込んで読むため。"},{"id":"P5-030","part":"Part 5 — 面接の実践","ch":"第28章","type":"choice","q":"使用技術欄が「実務レベルか学習レベルか」曖昧なとき、実態を確かめる聞き方として最も適切なものはどれか。","opts":["その技術を使って具体的に何を作り、どこを担当したかを語ってもらう","その技術の最新バージョンや新しく入った機能を知っているかを質問する","その技術の正式名称や略語が何の略かを、その場で正確に答えてもらう","その技術が好きかどうか、これからも使っていきたいかを尋ねてみる","その技術を何年使ってきたか、経験した年数だけを自己申告してもらう"],"ans":"その技術を使って具体的に何を作り、どこを担当したかを語ってもらう","ex":"第28〜29章。実務か学習かは「具体的に何を作り、どこを担当したか」を自分の言葉で語れるかで見分ける。年数や用語の暗記では実態は測れない。","why":"スキルシートでは曖昧な「実務／学習」を、面接の聞き方で見極めるため。"}];
</script>
<script>
const $ = function(s){ return document.querySelector(s); };
const BANK = window.BANK || [];
const QSEC = 20, CDSEC = 3, PASS = 80, TOTAL = 25, NEED = 20;
const BEST_KEY = 'stage1rich_best_parts';
const SALT = 'eightbit-stage1-2026';

function shuffle(a){ a = a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function cyrb53(str, seed){ seed=seed||0; let h1=0xdeadbeef^seed, h2=0x41c6ce57^seed; for(let i=0,ch;i<str.length;i++){ ch=str.charCodeAt(i); h1=Math.imul(h1^ch,2654435761); h2=Math.imul(h2^ch,1597334677); } h1=Math.imul(h1^(h1>>>16),2246822507); h1^=Math.imul(h2^(h2>>>13),3266489909); h2=Math.imul(h2^(h2>>>16),2246822507); h2^=Math.imul(h1^(h1>>>13),3266489909); return ('00000000'+(4294967296*(2097151&h2)+(h1>>>0)).toString(16)).slice(-13); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const TR = 27, TC = 2*Math.PI*TR;
const CDR = 88, CDC = 2*Math.PI*CDR;
let order = [], answers = {}, cur = 0, tId = null, lastJSON = '';

function setMode(m){ document.body.setAttribute('data-mode', m); }
function show(id){ ['landing','runner','result'].forEach(function(s){ $('#'+s).classList.toggle('on', s===id); }); }

function showBest(){
  let bests = {}; try{ bests = JSON.parse(localStorage.getItem(BEST_KEY)||'{}'); }catch(e){}
  const parts = Array.from(new Set(BANK.map(function(q){ return q.part; })));
  const items = parts.map(function(p){
    const b = bests[p];
    const label = p.split('—')[0].trim();
    return '<span class="pb '+(b?'pb--has':'')+'"><span class="pb__p">'+label+'</span><span class="pb__v">'+(b?b.pct+'%':'—')+'</span></span>';
  }).join('');
  $('#best').innerHTML = '<div class="best-ttl">このブラウザの自己ベスト（Part別）</div><div class="pb-row">'+items+'</div>';
}

function buildOrder(){
  const sel = $('#partsel') ? $('#partsel').value : '';
  const parts = Array.from(new Set(BANK.map(function(q){ return q.part; })));
  const target = sel ? [sel] : parts;
  const cap = sel ? TOTAL : Math.ceil(TOTAL/parts.length);
  let ord = [];
  target.forEach(function(p){
    const idxs = BANK.map(function(q,i){ return i; }).filter(function(i){ return BANK[i].part===p; });
    shuffle(idxs).slice(0, cap).forEach(function(i){ ord.push(i); });
  });
  return shuffle(ord).slice(0, TOTAL);
}

function start(){
  const who = $('#who').value.trim();
  if(!who){ $('#who').classList.add('need'); $('#who').focus(); return; }
  order = buildOrder();
  answers = {}; cur = 0;
  $('#pTot').textContent = order.length;
  $('#pFill').style.width = '0%';
  show('runner'); setMode('test');
  runCountdown(function(){ showQ(0); });
}

function runCountdown(done){
  const ov=$('#cd'), bar=$('#cdBar'), num=$('#cdNum');
  bar.style.strokeDasharray = CDC; bar.style.strokeDashoffset = 0;
  num.textContent = CDSEC;
  ov.classList.add('on');
  const t0 = Date.now(), span = CDSEC*1000; let last = CDSEC;
  const iv = setInterval(function(){
    const rem = Math.max(0, span-(Date.now()-t0));
    const s = Math.ceil(rem/1000)||0;
    if(s!==last && s>0){ last=s; num.textContent=s; num.classList.remove('tick'); void num.offsetWidth; num.classList.add('tick'); }
    bar.style.strokeDashoffset = CDC*(1-rem/span);
    if(rem<=0){ clearInterval(iv); ov.classList.remove('on'); done(); }
  }, 60);
}

function showQ(i){
  cur = i;
  const q = BANK[order[i]];
  const last = (i === order.length-1);
  $('#pNow').textContent = i+1;
  $('#pPart').textContent = q.part.split('—')[0].trim() + ' ・ ' + q.ch;
  $('#pFill').style.width = Math.round(i/order.length*100) + '%';
  const opts = shuffle(q.opts).map(function(o){
    return '<button class="opt" type="button" data-v="'+encodeURIComponent(o)+'"><span class="mk"></span><span>'+esc(o)+'</span></button>';
  }).join('');
  $('#qhost').innerHTML = '<div class="qcard"><div class="qtext">'+esc(q.q)+'</div><div class="opts">'+opts+'</div></div>';
  const nb = $('#nextBtn'); nb.disabled = true; nb.textContent = last ? '結果を見る' : '次へ';
  Array.prototype.forEach.call($('#qhost').querySelectorAll('.opt'), function(el){
    el.addEventListener('click', function(){
      Array.prototype.forEach.call($('#qhost').querySelectorAll('.opt'), function(x){ x.classList.remove('sel'); });
      el.classList.add('sel');
      answers[order[i]] = decodeURIComponent(el.getAttribute('data-v'));
      nb.disabled = false;
    });
  });
  window.scrollTo(0,0);
  startTimer();
}

function startTimer(){
  if(tId) clearInterval(tId);
  const bar=$('#tBar'), num=$('#tNum');
  bar.style.strokeDasharray = TC;
  const t0=Date.now(), span=QSEC*1000;
  const upd = function(){
    const rem = Math.max(0, span-(Date.now()-t0));
    const s = Math.ceil(rem/1000);
    num.textContent = s;
    bar.style.strokeDashoffset = TC*(1-rem/span);
    const warn = s<=10, crit = s<=5;
    bar.classList.toggle('warn', warn&&!crit); bar.classList.toggle('crit', crit);
    num.classList.toggle('warn', warn&&!crit); num.classList.toggle('crit', crit);
    if(rem<=0){ clearInterval(tId); tId=null; goNext(); }
  };
  upd(); tId = setInterval(upd, 100);
}

function goNext(){
  if(tId){ clearInterval(tId); tId=null; }
  if(cur < order.length-1) showQ(cur+1); else finish();
}

function gradeOne(bi){ return answers[bi] === BANK[bi].ans; }

function finish(){
  if(tId){ clearInterval(tId); tId=null; }
  $('#pFill').style.width = '100%';
  let correct = 0; order.forEach(function(bi){ if(gradeOne(bi)) correct++; });
  const total = order.length;
  const pct = Math.round(correct/total*100);
  const pass = (pct >= PASS && correct >= NEED);

  const who = $('#who').value.trim() || '（名前未入力）';
  const d = new Date();
  const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const details = order.map(function(bi, idx){ const q=BANK[bi]; return { no:idx+1, id:q.id, chapter:q.ch, correct:gradeOne(bi) }; });
  const payload = { test:'Stage1 Knowledge Test (rich proto)', examinee:who, date:ds, score:{ correct:correct, total:total, percent:pct, result: pass?'pass':'fail' }, answers:details };
  payload.checksum = cyrb53(JSON.stringify(payload)+SALT);
  lastJSON = JSON.stringify(payload, null, 2);

  try{
    const bests = JSON.parse(localStorage.getItem(BEST_KEY)||'{}');
    const agg = {};
    order.forEach(function(bi){ const p=BANK[bi].part; (agg[p]=agg[p]||{c:0,t:0}); agg[p].t++; if(gradeOne(bi))agg[p].c++; });
    Object.keys(agg).forEach(function(p){ const ppct=Math.round(agg[p].c/agg[p].t*100); if(!bests[p]||ppct>bests[p].pct){ bests[p]={pct:ppct, ds:ds}; } });
    localStorage.setItem(BEST_KEY, JSON.stringify(bests));
  }catch(e){}

  setMode('result'); show('result');
  $('#result').classList.remove('reviewing');
  $('#resultWrap').innerHTML =
    '<div class="res-card">'+
      '<div class="res-eyebrow">採点結果</div>'+
      '<div class="res-score"><span id="scoreNum">0</span><span class="pc">%</span></div>'+
      '<div class="res-frac">'+correct+' / '+total+' 問正解</div>'+
      '<div class="badge '+(pass?'pass':'fail')+'">'+(pass?'合格':'不合格')+'</div>'+
      '<div class="res-actions">'+
        '<button class="btn btn-primary" id="dlBtn">テスト結果をダウンロード</button>'+
        '<button class="btn btn-ghost" id="revealBtn">解答を表示する</button>'+
      '</div>'+
      '<div class="res-back"><button class="btn btn-ghost" id="backBtn">受験者名・範囲を選び直す</button></div>'+
    '</div>';
  $('#dlBtn').addEventListener('click', downloadJSON);
  $('#revealBtn').addEventListener('click', reveal);
  $('#backBtn').addEventListener('click', backToStart);
  window.scrollTo(0,0);
  countUp($('#scoreNum'), pct, 850);
}

function countUp(el, target, ms){
  const t0 = Date.now();
  const step = function(){
    const k = Math.min(1, (Date.now()-t0)/ms);
    const e = 1 - Math.pow(1-k, 3);
    el.textContent = Math.round(target*e);
    if(k<1) requestAnimationFrame(step); else el.textContent = target;
  };
  requestAnimationFrame(step);
}

function downloadJSON(){
  const who = ($('#who').value.trim()||'result').replace(/[\\/:*?"<>|\s]+/g,'_');
  const d = new Date();
  const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const blob = new Blob([lastJSON], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'stage1_'+who+'_'+ds+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

function reveal(){
  if($('#review')) return;
  let html = '<div class="review" id="review"><div class="review-h">解答と解説（全'+order.length+'問）</div>';
  order.forEach(function(bi, idx){
    const q = BANK[bi], given = answers[bi], ok = gradeOne(bi);
    const opts = q.opts.map(function(o){
      let cls='rv-opt', tag='';
      if(o===q.ans){ cls+=' correct'; tag='正解'; }
      else if(o===given){ cls+=' wrong'; tag='あなたの回答'; }
      return '<div class="'+cls+'"><span>'+esc(o)+'</span>'+(tag?'<span class="tag">'+tag+'</span>':'')+'</div>';
    }).join('');
    const vc = ok?'ok':(given?'ng':'no');
    const vt = ok?'◎ 正解':(given?'✕ 不正解':'― 未回答');
    html += '<div class="rv"><div class="rv-top"><span class="rv-no">Q'+(idx+1)+'</span><span class="rv-verdict '+vc+'">'+vt+'</span></div>'+
      '<div class="rv-q">'+esc(q.q)+'</div>'+opts+
      '<div class="rv-ex">'+esc(q.ex)+'</div>'+
      '<div class="rv-why">面接での効用：'+esc(q.why)+'</div>'+
      '<div class="rv-ch">'+esc(q.ch)+'</div></div>';
  });
  html += '</div>';
  $('#resultWrap').insertAdjacentHTML('beforeend', html);
  $('#result').classList.add('reviewing');
  $('#revealBtn').disabled = true;
  window.scrollTo({ top:0, behavior:'smooth' });
}

function backToStart(){
  if(tId){ clearInterval(tId); tId=null; }
  $('#resultWrap').innerHTML = '';
  $('#result').classList.remove('reviewing');
  setMode('landing'); show('landing');
  showBest();
  window.scrollTo(0,0);
}

$('#startBtn').addEventListener('click', start);
$('#who').addEventListener('input', function(){ $('#who').classList.remove('need'); });
$('#who').addEventListener('keydown', function(e){ if(e.key==='Enter') start(); });
$('#nextBtn').addEventListener('click', goNext);
$('#endBtn').addEventListener('click', function(){ if(tId){ clearInterval(tId); tId=null; } $('#endModal').classList.add('on'); });
$('#endOk').addEventListener('click', function(){ $('#endModal').classList.remove('on'); finish(); });
$('#endCancel').addEventListener('click', function(){ $('#endModal').classList.remove('on'); startTimer(); });

showBest();
</script>
</body>
</html>
